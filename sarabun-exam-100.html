<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อสอบระเบียบสารบรรณ 100 ข้อ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--border:#2e3350;--border2:#3d4468;--accent:#4f7cff;--accent2:#7b9fff;--green:#22c55e;--green-bg:rgba(34,197,94,0.12);--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--text:#e8eaf4;--text2:#8b93b5;--text3:#5a6382;--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.hdr{background:#1a1d27;border-bottom:1px solid var(--border);padding:1.5rem 2rem 1rem;position:sticky;top:0;z-index:100}
.hdr h1{font-size:clamp(14px,2vw,18px);font-weight:600;margin-bottom:3px}
.hdr p{font-size:12px;color:var(--text2)}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-top:1rem}
.sp{background:var(--surface);padding:9px 8px;text-align:center}
.sv{font-size:20px;font-weight:700;line-height:1}
.sl{font-size:11px;color:var(--text2);margin-top:1px}
.sv.c{color:var(--green)}.sv.w{color:var(--red)}.sv.r{color:var(--accent2)}
.prog{margin-top:.6rem}
.pt{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s;width:0%}
.pl{font-size:11px;color:var(--text3);text-align:right;margin-top:3px}
.ctrl{display:flex;gap:8px;align-items:center;padding:.75rem 2rem;flex-wrap:wrap}
.btn{font-family:inherit;font-size:12.5px;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;border:none;transition:all .15s}
.btnp{background:var(--accent);color:#fff}
.btnp:hover{background:var(--accent2);transform:translateY(-1px)}
.btng{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btng:hover{background:var(--border);color:var(--text)}
.btnf{background:var(--surface);color:var(--text2);border:1px solid var(--border);font-size:12px;padding:5px 12px}
.btnf.act{background:rgba(79,124,255,.15);color:var(--accent2);border-color:rgba(79,124,255,.4)}
.div{width:1px;height:20px;background:var(--border);margin:0 2px}
.main{padding:0 2rem 3rem;max-width:900px;margin:0 auto}
.scard{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2rem;text-align:center;margin-bottom:1.5rem}
.scard.show{display:block;animation:fs .4s ease}
.snum{font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:.4rem 0;line-height:1.1}
.smsg{font-size:13px;color:var(--text2)}
.sbar2{width:100%;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:1rem}
.sfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 1s cubic-bezier(.4,0,.2,1);width:0%}
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.2rem 1.4rem;margin-bottom:.8rem;transition:border-color .2s;animation:fs .3s ease both}
.qc.ans{border-color:rgba(79,124,255,.25)}
.qc.cs{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04)}
.qc.ws{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.04)}
.qt{display:flex;gap:10px;align-items:flex-start;margin-bottom:.8rem}
.qb{min-width:28px;height:22px;border-radius:6px;background:var(--surface2);color:var(--text3);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.qtx{font-size:14px;flex:1}
.rtag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0;margin-top:1px}
.rtag.ok{background:var(--green-bg);color:var(--green)}
.rtag.no{background:var(--red-bg);color:var(--red)}
.choices{display:flex;flex-direction:column;gap:5px}
.ch{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;line-height:1.55;transition:all .12s;user-select:none}
.ch:hover{background:var(--surface2);border-color:var(--border2)}
.ch.sel{border-color:var(--accent);background:rgba(79,124,255,.1);color:var(--accent2)}
.ch.ca{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.ch.wa{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.cl{font-weight:600;font-size:12px;min-width:16px;flex-shrink:0;margin-top:1px}
.exp{display:none;margin-top:.7rem;padding:.7rem 1rem;border-radius:8px;background:rgba(79,124,255,.07);border-left:3px solid var(--accent);font-size:12.5px;line-height:1.65;color:var(--text2)}
.exp.show{display:block;animation:fs .25s ease}
.exp strong{color:var(--accent2)}
.empty{text-align:center;padding:3rem;color:var(--text2);font-size:14px}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hdr,.ctrl{padding-left:1rem;padding-right:1rem}.main{padding:0 1rem 3rem}.snum{font-size:38px}}
</style>
</head>
<body>
<div class="hdr">
  <h1>📋 ข้อสอบระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ พ.ศ. 2526 และที่แก้ไขเพิ่มเติม</h1>
  <p>100 ข้อ • ระดับยาก • คลิกตัวเลือกเพื่อตอบ • กดส่งคำตอบเพื่อดูเฉลยและคำอธิบาย</p>
  <div class="sbar">
    <div class="sp"><div class="sv" id="s-total">100</div><div class="sl">ทั้งหมด</div></div>
    <div class="sp"><div class="sv c" id="s-correct">0</div><div class="sl">ถูก</div></div>
    <div class="sp"><div class="sv w" id="s-wrong">0</div><div class="sl">ผิด</div></div>
    <div class="sp"><div class="sv r" id="s-remain">100</div><div class="sl">ยังไม่ตอบ</div></div>
  </div>
  <div class="prog">
    <div class="pt"><div class="pf" id="prog"></div></div>
    <div class="pl" id="prog-lbl">0 / 100 ข้อ</div>
  </div>
</div>

<div class="ctrl">
  <button class="btn btnp" onclick="submitAll()">ส่งคำตอบทั้งหมด</button>
  <button class="btn btng" onclick="resetAll()">เริ่มใหม่</button>
  <div class="div"></div>
  <button class="btn btnf act" id="f-all" onclick="setFilter('all')">ทั้งหมด</button>
  <button class="btn btnf" id="f-wrong" onclick="setFilter('wrong')">ตอบผิด</button>
  <button class="btn btnf" id="f-unanswered" onclick="setFilter('unanswered')">ยังไม่ตอบ</button>
</div>

<div class="main">
  <div id="score-card" class="scard">
    <div style="font-size:13px;color:var(--text2)">คะแนนสุดท้าย</div>
    <div class="snum" id="score-num">0/100</div>
    <div class="smsg" id="score-msg"></div>
    <div class="sbar2"><div class="sfill" id="score-fill"></div></div>
  </div>
  <div id="qlist"></div>
</div>

<script>
const QS=[
{q:"งานสารบรรณตามระเบียบสำนักนายกรัฐมนตรีฯ หมายความว่าอย่างไร",c:["งานเกี่ยวกับการเขียนหนังสือราชการเท่านั้น","งานที่เกี่ยวกับการบริหารงานเอกสาร ตั้งแต่การจัดทำ รับ ส่ง เก็บรักษา ยืม และทำลาย","งานพิมพ์เอกสารและจัดเก็บแฟ้ม","งานธุรการทั่วไปของส่วนราชการ"],a:1,ex:"ระเบียบฯ นิยาม 'งานสารบรรณ' ว่าหมายถึงงานที่เกี่ยวกับการบริหารงานเอกสาร ตั้งแต่การจัดทำ การรับ การส่ง การเก็บรักษา การยืม และการทำลาย ครอบคลุมทุกขั้นตอนของเอกสาร"},
{q:"หนังสือราชการตามระเบียบฯ มีกี่ชนิด",c:["4 ชนิด","5 ชนิด","6 ชนิด","7 ชนิด"],a:2,ex:"หนังสือราชการมี 6 ชนิด ได้แก่ 1.หนังสือภายนอก 2.หนังสือภายใน 3.หนังสือประทับตรา 4.หนังสือสั่งการ 5.หนังสือประชาสัมพันธ์ 6.หนังสือที่เจ้าหน้าที่ทำขึ้นหรือรับไว้เป็นหลักฐานในราชการ"},
{q:"หนังสือภายนอกใช้กระดาษชนิดใด",c:["กระดาษธรรมดา","กระดาษตราครุฑ","กระดาษบันทึกข้อความ","กระดาษ A4 สีขาว"],a:1,ex:"หนังสือภายนอกใช้กระดาษตราครุฑ เพราะเป็นหนังสือที่ติดต่อระหว่างส่วนราชการกับส่วนราชการหรือกับบุคคลภายนอก ต้องแสดงความเป็นทางการ"},
{q:"หนังสือภายในใช้สำหรับการติดต่อสื่อสารในลักษณะใด",c:["ติดต่อระหว่างส่วนราชการกับบุคคลภายนอก","ติดต่อภายในกระทรวงเดียวกันหรือส่วนราชการเดียวกัน","ติดต่อระหว่างประเทศ","ติดต่อกับองค์กรระหว่างประเทศ"],a:1,ex:"หนังสือภายในใช้ติดต่อภายในกระทรวงเดียวกัน ไม่ใช้กระดาษตราครุฑ แต่ใช้กระดาษที่มีหัวกระดาษของส่วนราชการนั้น"},
{q:"ส่วนประกอบใดของหนังสือภายนอกที่ไม่มีในหนังสือภายใน",c:["ที่","วันเดือนปี","คำขึ้นต้น","อ้างถึง (ถ้ามี)"],a:3,ex:"หนังสือภายนอกมีรายการ 'อ้างถึง (ถ้ามี)' ซึ่งหนังสือภายในไม่มีรายการนี้ เนื่องจากภายในใช้หัวข้อในส่วนข้อความแทน"},
{q:"หนังสือประทับตราใช้แทนสิ่งใด",c:["แทนการส่งโทรสาร","แทนการลงชื่อของหัวหน้าส่วนราชการระดับกรมขึ้นไป","แทนหนังสือภายนอกในทุกกรณี","แทนบันทึกข้อความ"],a:1,ex:"หนังสือประทับตราใช้แทนการลงชื่อของหัวหน้าส่วนราชการระดับกรมขึ้นไป และใช้เฉพาะกรณีที่ไม่ใช่เรื่องสำคัญ เช่น ขอรายละเอียดเพิ่มเติม ส่งสำเนาหนังสือ ตอบรับทราบ"},
{q:"หนังสือประทับตราใช้ในกรณีใดต่อไปนี้",c:["แจ้งคำสั่งแต่งตั้งผู้บริหารระดับสูง","ขอรายละเอียดเพิ่มเติมที่ไม่ใช่เรื่องสำคัญ","ตอบรับการเสนอราคาจัดซื้อครุภัณฑ์","แจ้งผลการสอบคัดเลือกบุคคล"],a:1,ex:"หนังสือประทับตราใช้ได้ใน 6 กรณี ได้แก่ ขอรายละเอียดเพิ่มเติม ส่งสำเนา ตอบรับทราบที่ไม่เกี่ยวกับราชการสำคัญหรือการเงิน แจ้งผลงาน เตือนเรื่องที่ค้าง และตามที่หัวหน้าส่วนราชการระดับกรมขึ้นไปกำหนด"},
{q:"หนังสือสั่งการมีกี่ประเภท",c:["2 ประเภท","3 ประเภท","4 ประเภท","5 ประเภท"],a:1,ex:"หนังสือสั่งการมี 3 ประเภท ได้แก่ คำสั่ง ระเบียบ และข้อบังคับ"},
{q:"คำสั่งคืออะไร",c:["บรรดาข้อความที่ผู้มีอำนาจหน้าที่ได้วางไว้เพื่อถือเป็นหลักปฏิบัติงาน","บรรดาข้อความที่ผู้บังคับบัญชาสั่งการให้ปฏิบัติโดยชอบด้วยกฎหมาย","บรรดาข้อความที่ผู้มีอำนาจหน้าที่กำหนดให้ใช้โดยอาศัยอำนาจของกฎหมาย","บรรดาข้อความที่ทางราชการประกาศให้ทราบหรือแนะแนวทางปฏิบัติ"],a:1,ex:"คำสั่ง คือ บรรดาข้อความที่ผู้บังคับบัญชาสั่งการให้ปฏิบัติโดยชอบด้วยกฎหมาย ผู้ออกคำสั่งต้องเป็นผู้บังคับบัญชาและต้องชอบด้วยกฎหมาย"},
{q:"ระเบียบคืออะไร",c:["บรรดาข้อความที่ผู้บังคับบัญชาสั่งการให้ปฏิบัติโดยชอบด้วยกฎหมาย","บรรดาข้อความที่ผู้มีอำนาจหน้าที่ได้วางไว้เพื่อถือเป็นหลักปฏิบัติงานเป็นการประจำ","บรรดาข้อความที่ผู้มีอำนาจหน้าที่กำหนดให้ใช้โดยอาศัยอำนาจของกฎหมายที่บัญญัติให้กระทำได้","บรรดาข้อความที่ทางราชการแถลงเพื่อทำความเข้าใจในกิจการ"],a:1,ex:"ระเบียบ คือ บรรดาข้อความที่ผู้มีอำนาจหน้าที่ได้วางไว้โดยจะอาศัยอำนาจของกฎหมายหรือไม่ก็ได้ เพื่อถือเป็นหลักปฏิบัติงานเป็นการประจำ"},
{q:"ข้อบังคับต่างจากระเบียบอย่างไร",c:["ข้อบังคับต้องอาศัยอำนาจของกฎหมาย แต่ระเบียบไม่ต้องก็ได้","ข้อบังคับใช้สำหรับบุคคลภายนอก แต่ระเบียบใช้ภายใน","ข้อบังคับออกโดยรัฐมนตรี แต่ระเบียบออกโดยอธิบดี","ข้อบังคับต้องประกาศในราชกิจจานุเบกษา แต่ระเบียบไม่ต้อง"],a:0,ex:"ข้อบังคับต้องอาศัยอำนาจของกฎหมายที่บัญญัติให้กระทำได้ จึงออกได้ ขณะที่ระเบียบจะอาศัยอำนาจกฎหมายหรือไม่ก็ได้"},
{q:"หนังสือประชาสัมพันธ์มีกี่ประเภท",c:["2 ประเภท","3 ประเภท","4 ประเภท","5 ประเภท"],a:1,ex:"หนังสือประชาสัมพันธ์มี 3 ประเภท ได้แก่ ประกาศ แถลงการณ์ และข่าว"},
{q:"ประกาศต่างจากแถลงการณ์อย่างไร",c:["ประกาศมีฉบับที่กำกับ แถลงการณ์ไม่มี","ประกาศใช้แจ้งให้ทราบหรือแนะแนวทาง แถลงการณ์ใช้เพื่อทำความเข้าใจในกิจการ","ประกาศออกโดยรัฐมนตรี แถลงการณ์ออกโดยอธิบดี","ประกาศใช้กระดาษตราครุฑ แถลงการณ์ใช้กระดาษธรรมดา"],a:1,ex:"ประกาศ คือ ข้อความที่ทางราชการประกาศหรือชี้แจงให้ทราบหรือแนะแนวทางปฏิบัติ แถลงการณ์ คือ ข้อความที่ทางราชการแถลงเพื่อทำความเข้าใจในกิจการของทางราชการหรือเหตุการณ์"},
{q:"หนังสือที่เจ้าหน้าที่ทำขึ้นเป็นหลักฐานในราชการมีกี่ชนิด",c:["2 ชนิด","3 ชนิด","4 ชนิด","5 ชนิด"],a:2,ex:"หนังสือที่เจ้าหน้าที่ทำขึ้นหรือรับไว้เป็นหลักฐานในราชการมี 4 ชนิด ได้แก่ หนังสือรับรอง รายงานการประชุม บันทึก และหนังสืออื่น"},
{q:"รายงานการประชุมบันทึกอะไร",c:["เฉพาะมติที่ประชุมเท่านั้น","ความคิดเห็นของผู้มาประชุม ผู้เข้าร่วมประชุม และมติของที่ประชุม","รายชื่อผู้เข้าประชุมและวาระการประชุม","ระเบียบวาระและการพิจารณาของประธาน"],a:1,ex:"รายงานการประชุม คือ การบันทึกความคิดเห็นของผู้มาประชุม ผู้เข้าร่วมประชุม และมติของที่ประชุมไว้เป็นหลักฐาน ต้องบันทึกครบทุกองค์ประกอบ"},
{q:"บันทึกคืออะไร",c:["หนังสือที่ส่วนราชการออกให้เพื่อรับรองบุคคล","ข้อความที่ผู้ใต้บังคับบัญชาเสนอต่อผู้บังคับบัญชา หรือผู้บังคับบัญชาสั่งการแก่ผู้ใต้บังคับบัญชา","หนังสือที่ใช้ติดต่อระหว่างส่วนราชการ","หนังสือที่ออกโดยอาศัยอำนาจของกฎหมาย"],a:1,ex:"บันทึก คือ ข้อความที่ผู้ใต้บังคับบัญชาเสนอต่อผู้บังคับบัญชา หรือผู้บังคับบัญชาสั่งการแก่ผู้ใต้บังคับบัญชา รวมถึงข้อความที่เจ้าหน้าที่ติดต่อกันภายในระดับกรม"},
{q:"'หนังสืออื่น' ในหมวดหนังสือที่เจ้าหน้าที่ทำขึ้นเป็นหลักฐานในราชการ หมายถึงอะไร",c:["หนังสือที่ไม่ได้จัดอยู่ในประเภทใดเลย","เอกสารอื่นใดที่เกิดจากการปฏิบัติงาน เช่น ภาพถ่าย ฟิล์ม แถบบันทึกเสียง แถบบันทึกภาพ สื่อกลางบันทึกข้อมูล","หนังสือจากบุคคลภายนอกที่ยังไม่ได้รับการบันทึก","บันทึกข้อตกลงระหว่างส่วนราชการ"],a:1,ex:"หนังสืออื่น คือ หนังสือหรือเอกสารอื่นใดที่เกิดจากการปฏิบัติงานเพื่อเป็นหลักฐานในราชการ รวมถึง ภาพถ่าย ฟิล์ม แถบบันทึกเสียง แถบบันทึกภาพ สื่อกลางบันทึกข้อมูล (รวมบริการคลาวด์) และหนังสือบุคคลภายนอกที่เข้าทะเบียนรับแล้ว"},
{q:"'สื่อกลางบันทึกข้อมูล' ตามระเบียบฯ รวมถึงอะไร",c:["เฉพาะ USB Flash Drive","เฉพาะฮาร์ดดิสก์","สื่อใดๆ ที่อาจใช้บันทึกข้อมูลด้วยอุปกรณ์ทางอิเล็กทรอนิกส์ รวมถึงบริการคลาวด์","เฉพาะแผ่น CD และ DVD"],a:2,ex:"ระเบียบฯ นิยาม 'สื่อกลางบันทึกข้อมูล' ว่าหมายถึงสื่อใดๆ ที่อาจใช้บันทึกข้อมูลได้ด้วยอุปกรณ์ทางอิเล็กทรอนิกส์ รวมถึงพื้นที่ส่วนราชการใช้จัดเก็บข้อมูลอิเล็กทรอนิกส์ เช่น บริการคลาวด์"},
{q:"ชั้นความเร็วของหนังสือราชการแบ่งเป็นกี่ประเภท",c:["2 ประเภท","3 ประเภท","4 ประเภท","5 ประเภท"],a:1,ex:"ชั้นความเร็วแบ่งเป็น 3 ประเภท ได้แก่ 1.ด่วนที่สุด (ปฏิบัติทันที) 2.ด่วนมาก (ปฏิบัติโดยเร็ว) 3.ด่วน (ปฏิบัติเร็วกว่าปกติเท่าที่จะทำได้)"},
{q:"หนังสือ 'ด่วนที่สุด' มีความหมายว่าอย่างไร",c:["ให้เจ้าหน้าที่ปฏิบัติโดยเร็ว","ให้เจ้าหน้าที่ปฏิบัติในทันทีที่ได้รับหนังสือนั้น","ให้เจ้าหน้าที่ปฏิบัติเร็วกว่าปกติ","ให้ผู้บังคับบัญชาระดับสูงพิจารณาก่อน"],a:1,ex:"'ด่วนที่สุด' หมายความว่าให้เจ้าหน้าที่ปฏิบัติในทันทีที่ได้รับหนังสือนั้น โดยต้องระบุตัวอักษรสีแดงขนาดไม่เล็กกว่าตัวพิมพ์โป้ง 32 พอยต์"},
{q:"การระบุชั้นความเร็วบนหนังสือราชการต้องใช้ตัวอักษรสีใด",c:["สีน้ำเงิน","สีดำ","สีแดง","สีเขียว"],a:2,ex:"การระบุชั้นความเร็วต้องใช้ตัวอักษรสีแดง ขนาดไม่เล็กกว่าตัวพิมพ์โป้ง 32 พอยต์ เพื่อให้เห็นได้ชัดเจน"},
{q:"ชั้นความลับของหนังสือราชการแบ่งเป็นกี่ชั้น",c:["2 ชั้น","3 ชั้น","4 ชั้น","5 ชั้น"],a:1,ex:"ชั้นความลับแบ่งเป็น 3 ชั้น ได้แก่ ลับที่สุด ลับมาก และลับ โดยการรักษาความลับให้ปฏิบัติตามกฎหมายและระเบียบว่าด้วยการรักษาความลับ"},
{q:"หนังสือเวียนมีลักษณะอย่างไร",c:["หนังสือที่มีผู้รับเพียงคนเดียว","หนังสือที่มีถึงผู้รับเป็นจำนวนมากและมีใจความอย่างเดียวกัน","หนังสือที่ส่งเป็นชุด","หนังสือที่ส่งไปทุกส่วนราชการในกระทรวง"],a:1,ex:"หนังสือเวียน คือ หนังสือที่มีถึงผู้รับเป็นจำนวนมากและมีใจความอย่างเดียวกัน ให้เพิ่มรหัสตัวพยัญชนะ 'ว' หน้าเลขทะเบียนหนังสือส่ง"},
{q:"ตัวอย่างเลขที่หนังสือเวียนควรมีลักษณะอย่างไร",c:["สค ๐๐๑๗.๑/๓๒๗๓","สค ๐๐๑๗.๑/ว ๓๒๗๓","ว ๓๒๗๓","สค/ว/๓๒๗๓"],a:1,ex:"หนังสือเวียนให้ใช้รหัสตัวพยัญชนะ 'ว' นำหน้าเลขทะเบียนหนังสือส่ง เช่น สค ๐๐๑๗.๑/ว ๓๒๗๓ ดังตัวอย่างในระเบียบ"},
{q:"สำเนาหนังสือแบ่งเป็นกี่ประเภท",c:["1 ประเภท","2 ประเภท","3 ประเภท","4 ประเภท"],a:1,ex:"สำเนาแบ่งเป็น 2 ประเภท คือ สำเนาคู่ฉบับ (จัดทำพร้อมต้นฉบับ) และสำเนา (จัดทำขึ้นภายหลัง โดยปกติต้องมีคำรับรอง 'สำเนาถูกต้อง')"},
{q:"ผู้ใดมีอำนาจรับรองสำเนาหนังสือว่า 'สำเนาถูกต้อง'",c:["ข้าราชการทุกคน","ข้าราชการประเภทวิชาการ ระดับปฏิบัติการขึ้นไป หรือประเภททั่วไป ระดับชำนาญงานขึ้นไป","เฉพาะหัวหน้าส่วนราชการเท่านั้น","เฉพาะข้าราชการระดับชำนาญการพิเศษขึ้นไป"],a:1,ex:"ผู้รับรองสำเนา 'สำเนาถูกต้อง' ต้องเป็นข้าราชการประเภทวิชาการ ระดับปฏิบัติการขึ้นไป หรือประเภททั่วไป ระดับชำนาญงานขึ้นไป หรือเจ้าหน้าที่ของรัฐอื่นที่เทียบเท่า หรือพนักงานราชการ ซึ่งเป็นเจ้าของเรื่อง"},
{q:"การรับรองสำเนาต้องลงอะไรบ้าง",c:["ลายมือชื่อเท่านั้น","ลายมือชื่อรับรอง ลงชื่อตัวบรรจง ตำแหน่ง และวันเดือนปีที่รับรอง","ลายมือชื่อและตำแหน่ง","ชื่อย่อและตำแหน่ง"],a:1,ex:"การรับรองสำเนาต้องลงลายมือชื่อรับรอง พร้อมทั้งลงชื่อตัวบรรจง ตำแหน่ง และวันเดือนปีที่รับรองไว้ที่ขอบล่างของหนังสือ"},
{q:"การติดต่อราชการตามระเบียบฯ ที่แก้ไขเพิ่มเติม ให้ดำเนินการด้วยวิธีใดเป็นหลัก",c:["หนังสือกระดาษ","โทรศัพท์","ระบบสารบรรณอิเล็กทรอนิกส์","โทรสาร"],a:2,ex:"ระเบียบฯ ที่แก้ไขเพิ่มเติมกำหนดให้การติดต่อราชการให้ดำเนินการด้วยระบบสารบรรณอิเล็กทรอนิกส์เป็นหลัก เว้นแต่กรณีที่เป็นข้อมูลลับชั้นลับที่สุด"},
{q:"'ระบบสารบรรณอิเล็กทรอนิกส์' หมายความว่าอย่างไร",c:["การส่งหนังสือทาง Email เท่านั้น","การรับส่งและเก็บรักษาข้อมูลข่าวสารหรือหนังสือผ่านระบบสื่อสารด้วยวิธีการทางอิเล็กทรอนิกส์","การสแกนเอกสารเป็น PDF","การพิมพ์เอกสารด้วยคอมพิวเตอร์"],a:1,ex:"ระบบสารบรรณอิเล็กทรอนิกส์ หมายถึง การรับส่งและเก็บรักษาข้อมูลข่าวสารหรือหนังสือผ่านระบบสื่อสารด้วยวิธีการทางอิเล็กทรอนิกส์ รวมถึงการรับส่งโดยใช้ไปรษณีย์อิเล็กทรอนิกส์"},
{q:"การรับหนังสือที่มีชั้นความลับในชั้นลับหรือลับมาก ผ่านระบบสารบรรณอิเล็กทรอนิกส์ ต้องปฏิบัติอย่างไร",c:["รับตามปกติเหมือนหนังสือทั่วไป","ผู้ใช้งานหรือผู้ปฏิบัติงานที่ได้รับการแต่งตั้งให้เข้าถึงเอกสารลับแต่ละระดับเป็นผู้รับผ่านระบบการรักษาความปลอดภัย","ส่งไปรษณีย์เท่านั้น","พิมพ์ออกมาก่อนแล้วค่อยรับ"],a:1,ex:"การรับหนังสือชั้นความลับในชั้นลับหรือลับมาก ต้องให้ผู้ใช้งานหรือผู้ปฏิบัติงานที่ได้รับการแต่งตั้งให้เข้าถึงเอกสารลับแต่ละระดับเป็นผู้รับผ่านระบบการรักษาความปลอดภัย"},
{q:"เมื่อรับหนังสือ ขั้นตอนใดต้องทำก่อน",c:["ลงทะเบียนรับ","ประทับตรารับหนังสือที่มุมบนด้านขวาของหนังสือ","เปิดซองตรวจเอกสาร","แยกหนังสือส่งให้หน่วยงาน"],a:1,ex:"ขั้นตอนแรกในการรับหนังสือคือประทับตรารับหนังสือที่มุมบนด้านขวาของหนังสือ จากนั้นลงทะเบียนรับ แล้วแยกหนังสือส่งให้ส่วนราชการปฏิบัติ"},
{q:"ตรารับหนังสือต้องมีข้อมูลอะไรบ้าง",c:["เฉพาะเลขรับ","เลขรับ วันที่ และเวลา","เลขรับ วันที่ เวลา และชื่อผู้รับ","เลขรับและชื่อหน่วยงาน"],a:1,ex:"ตรารับหนังสือต้องมี 3 รายการ คือ เลขรับ วันที่ (วันเดือนปีที่รับหนังสือ) และเวลา (เวลาที่รับหนังสือ)"},
{q:"ทะเบียนหนังสือรับต้องมีช่องรายการอะไรบ้าง",c:["เลขทะเบียนรับ ที่ ลงวันที่ จาก ถึง เรื่อง","เลขทะเบียนรับ ที่ ลงวันที่ จาก ถึง เรื่อง การปฏิบัติ หมายเหตุ","เลขทะเบียนรับ วันที่ ชื่อผู้ส่ง","เลขทะเบียนรับ ที่ วันที่ เรื่อง"],a:1,ex:"ทะเบียนหนังสือรับต้องมีช่องรายการครบถ้วน 7 ช่อง ได้แก่ เลขทะเบียนรับ ที่ ลงวันที่ จาก ถึง เรื่อง การปฏิบัติ และหมายเหตุ"},
{q:"เลขทะเบียนหนังสือรับต้องนับอย่างไร",c:["นับตามปีงบประมาณ","นับเลขลำดับเรียงต่อเนื่องตลอดปีปฏิทิน","นับตามเลขที่หนังสือของผู้ส่ง","ขึ้นอยู่กับส่วนราชการกำหนดเอง"],a:1,ex:"เลขทะเบียนรับให้ลงเลขลำดับเรียงตามลำดับตามปีปฏิทิน (1 มกราคม ถึง 31 ธันวาคม) และเลขทะเบียนต้องตรงกับเลขที่ในตรารับหนังสือ"},
{q:"ขั้นตอนสุดท้ายของการส่งหนังสือโดยไม่ผ่านทางไปรษณีย์คืออะไร",c:["ลงทะเบียนส่ง","ผู้รับลงชื่อในสมุดส่งหนังสือหรือใบรับ","ผนึกซอง","จ่าหน้าซอง"],a:1,ex:"เมื่อส่งหนังสือให้ผู้รับแล้ว ผู้ส่งต้องให้ผู้รับลงชื่อในสมุดส่งหนังสือหรือใบรับ แล้วแต่กรณี เพื่อเป็นหลักฐานการรับ"},
{q:"ส่วนราชการจะต้องจัดทำทะเบียนหรือบัญชีตามระเบียบฯ ได้แก่อะไรบ้าง",c:["เฉพาะทะเบียนหนังสือรับและส่ง","ทะเบียนหนังสือรับ ทะเบียนหนังสือส่ง บัญชีหนังสือส่งเก็บ ทะเบียนหนังสือเก็บ บัญชีส่งมอบหนังสือครบ 20 ปี บัญชีหนังสือครบ 20 ปีที่ขอเก็บเอง บัญชีฝากหนังสือ และบัญชีหนังสือขอทำลาย","เฉพาะทะเบียนหนังสือรับ ทะเบียนหนังสือส่ง และทะเบียนหนังสือเก็บ","ทะเบียนหนังสือรับและส่ง และบัญชีหนังสือขอทำลาย"],a:1,ex:"ระเบียบฯ กำหนดให้ส่วนราชการจัดทำทะเบียนและบัญชีรวม 8 รายการ ซึ่งสามารถจัดทำในรูปแบบอิเล็กทรอนิกส์ได้ เมื่อมีทะเบียนหรือบัญชีในรูปแบบอิเล็กทรอนิกส์แล้ว ไม่ต้องจัดทำเป็นเอกสารอีก"},
{q:"การส่งข้อความทางเครื่องมือสื่อสาร เช่น โทรศัพท์ ให้ผู้รับปฏิบัติอย่างไร",c:["ไม่ต้องดำเนินการใด เพราะไม่ใช่หนังสือ","ให้ผู้รับปฏิบัติเช่นเดียวกับได้รับหนังสือ","บันทึกเฉพาะกรณีสำคัญ","รอหนังสือยืนยันก่อนจึงปฏิบัติ"],a:1,ex:"การส่งข้อความทางเครื่องมือสื่อสาร ให้ผู้รับปฏิบัติเช่นเดียวกับได้รับหนังสือ ในกรณีจำเป็นต้องยืนยันเป็นหนังสือ ให้ทำหนังสือยืนยันตามไปทันที"},
{q:"โดยปกติหนังสือราชการให้เก็บรักษาไว้ไม่น้อยกว่ากี่ปี",c:["5 ปี","10 ปี","15 ปี","20 ปี"],a:1,ex:"ระเบียบฯ กำหนดให้เก็บหนังสือไว้โดยปกติไม่น้อยกว่า 10 ปี เว้นแต่หนังสือที่ต้องสงวนเป็นความลับ หนังสือที่มีกฎหมายกำหนดไว้เป็นพิเศษ หรือหนังสือธรรมดาสามัญ"},
{q:"หนังสือที่เป็นเรื่องธรรมดาสามัญซึ่งไม่มีความสำคัญ ให้เก็บไว้ไม่น้อยกว่ากี่ปี",c:["5 ปี","3 ปี","1 ปี","ไม่กำหนด"],a:2,ex:"หนังสือที่เป็นเรื่องธรรมดาสามัญซึ่งไม่มีความสำคัญและเป็นเรื่องที่เกิดขึ้นเป็นประจำ เมื่อดำเนินการแล้วเสร็จให้เก็บไว้ไม่น้อยกว่า 1 ปี"},
{q:"หนังสือเกี่ยวกับการรับเงิน การจ่ายเงินที่ไม่เป็นหลักฐานแห่งการก่อสิทธิ ให้เก็บไว้ไม่น้อยกว่ากี่ปี หลังสำนักงานการตรวจเงินแผ่นดินตรวจสอบแล้ว",c:["1 ปี","3 ปี","5 ปี","10 ปี"],a:2,ex:"หนังสือเกี่ยวกับการรับเงิน การจ่ายเงิน หรือการก่อหนี้ผูกพันทางการเงิน เมื่อสำนักงานการตรวจเงินแผ่นดินตรวจสอบแล้วไม่มีปัญหา ให้เก็บไว้ไม่น้อยกว่า 5 ปี"},
{q:"หนังสือที่มีคุณค่าทางประวัติศาสตร์ทุกสาขาวิชา ให้เก็บไว้อย่างไร",c:["10 ปี","20 ปี","ตลอดไปหรือตามที่สำนักหอจดหมายเหตุแห่งชาติกำหนด","5 ปี"],a:2,ex:"หนังสือที่มีคุณค่าทางประวัติศาสตร์และมีคุณค่าต่อการศึกษาค้นคว้าวิจัย ให้เก็บไว้เป็นหลักฐานสำคัญทางประวัติศาสตร์ของชาติตลอดไป หรือตามที่สำนักหอจดหมายเหตุแห่งชาติ กรมศิลปากร กำหนด"},
{q:"ทุกปีปฏิทิน ส่วนราชการต้องส่งหนังสือที่มีอายุครบ 20 ปี ไปยังไหน และภายในวันใด",c:["สำนักงานปลัดกระทรวง ภายใน 31 มีนาคม","หอจดหมายเหตุแห่งชาติ กรมศิลปากร ภายใน 31 มกราคมของปีถัดไป","กรมบัญชีกลาง ภายใน 31 ธันวาคม","สำนักนายกรัฐมนตรี ภายใน 28 กุมภาพันธ์"],a:1,ex:"ทุกปีปฏิทินให้ส่วนราชการจัดส่งหนังสือที่มีอายุครบ 20 ปี นับจากวันที่จัดทำขึ้น พร้อมบัญชีส่งมอบหนังสือครบ 20 ปี ให้หอจดหมายเหตุแห่งชาติ กรมศิลปากร ภายในวันที่ 31 มกราคมของปีถัดไป"},
{q:"การยืมหนังสือระหว่างส่วนราชการ ผู้ยืมและผู้อนุญาตต้องเป็นใคร",c:["ข้าราชการระดับใดก็ได้","หัวหน้าส่วนราชการระดับกองขึ้นไป หรือผู้ที่ได้รับมอบหมาย","เฉพาะอธิบดีหรือผู้ที่มีอำนาจเทียบเท่า","หัวหน้าส่วนราชการระดับแผนกขึ้นไป"],a:1,ex:"การยืมหนังสือระหว่างส่วนราชการ ผู้ยืมและผู้อนุญาตให้ยืมต้องเป็นหัวหน้าส่วนราชการระดับกองขึ้นไป หรือผู้ที่ได้รับมอบหมาย"},
{q:"การยืมหนังสือภายในส่วนราชการเดียวกัน ผู้ยืมและผู้อนุญาตต้องเป็นใคร",c:["ข้าราชการระดับใดก็ได้","หัวหน้าส่วนราชการระดับแผนกขึ้นไป หรือผู้ที่ได้รับมอบหมาย","หัวหน้าส่วนราชการระดับกองขึ้นไปเท่านั้น","เฉพาะหัวหน้าส่วนราชการ"],a:1,ex:"การยืมหนังสือภายในส่วนราชการเดียวกัน ผู้ยืมและผู้อนุญาตให้ยืมต้องเป็นหัวหน้าส่วนราชการระดับแผนกขึ้นไป หรือผู้ที่ได้รับมอบหมาย (ระดับต่ำกว่าการยืมระหว่างส่วนราชการ)"},
{q:"การสำรวจหนังสือที่ครบกำหนดอายุการเก็บเพื่อทำลาย ต้องทำภายในกี่วันหลังจากวันสิ้นปีปฏิทิน",c:["30 วัน","45 วัน","60 วัน","90 วัน"],a:2,ex:"ระเบียบฯ กำหนดให้สำรวจหนังสือที่ครบกำหนดอายุการเก็บในปีนั้นภายใน 60 วันหลังจากวันสิ้นปีปฏิทิน เพื่อเสนอหัวหน้าส่วนราชการระดับกรมพิจารณาแต่งตั้งคณะกรรมการทำลาย"},
{q:"คณะกรรมการทำลายหนังสือต้องประกอบด้วยใคร",c:["ประธานกรรมการ 1 คน","ประธานกรรมการและกรรมการอีกอย่างน้อย 2 คน","ประธานกรรมการและกรรมการอีก 1 คน","กรรมการอย่างน้อย 5 คน"],a:1,ex:"คณะกรรมการทำลายหนังสือประกอบด้วย ประธานกรรมการ และกรรมการอีกอย่างน้อย 2 คน โดยปกติให้แต่งตั้งจากข้าราชการตั้งแต่ระดับปฏิบัติการหรือเทียบเท่าขึ้นไป"},
{q:"ใครเป็นผู้แต่งตั้งคณะกรรมการทำลายหนังสือ",c:["หัวหน้าส่วนราชการระดับแผนก","หัวหน้าส่วนราชการระดับกรม","ปลัดกระทรวง","อธิบดีกรมศิลปากร"],a:1,ex:"หัวหน้าส่วนราชการระดับกรมเป็นผู้แต่งตั้งคณะกรรมการทำลายหนังสือ ซึ่งต้องประกอบด้วยประธานกรรมการและกรรมการอีกอย่างน้อย 2 คน"},
{q:"ก่อนทำลายหนังสือ ต้องส่งบัญชีหนังสือขอทำลายให้หน่วยงานใดพิจารณาก่อน",c:["สำนักนายกรัฐมนตรี","กองจดหมายเหตุแห่งชาติ กรมศิลปากร","สำนักงานการตรวจเงินแผ่นดิน","กรมบัญชีกลาง"],a:1,ex:"ก่อนทำลายหนังสือ ต้องส่งบัญชีหนังสือขอทำลายให้กองจดหมายเหตุแห่งชาติ กรมศิลปากร พิจารณาก่อน เว้นแต่หนังสือประเภทที่ส่วนราชการได้ขอทำความตกลงกับกรมศิลปากรแล้ว"},
{q:"ถ้ากองจดหมายเหตุแห่งชาติไม่แจ้งผลการพิจารณาภายในกี่วัน ถือว่าให้ความเห็นชอบ",c:["30 วัน","45 วัน","60 วัน","90 วัน"],a:2,ex:"ถ้ากองจดหมายเหตุแห่งชาติ กรมศิลปากรไม่แจ้งให้ทราบอย่างใดภายในกำหนดเวลา 60 วัน นับแต่วันที่ส่วนราชการส่งเรื่อง ให้ถือว่าได้ให้ความเห็นชอบแล้ว"},
{q:"การทำลายหนังสือทำได้ด้วยวิธีใด",c:["เฉพาะการเผา","การเผาหรือวิธีอื่นใดที่จะไม่ให้หนังสือนั้นอ่านเป็นเรื่องได้","เฉพาะการสับทำลาย","การฝังกลบเท่านั้น"],a:1,ex:"การทำลายหนังสือให้ทำโดยการเผาหรือวิธีอื่นใดที่จะไม่ให้หนังสือนั้นอ่านเป็นเรื่องได้ เพื่อป้องกันการนำข้อมูลในหนังสือไปใช้ในทางที่เสียหาย"},
{q:"ตราครุฑสำหรับแบบพิมพ์มีกี่ขนาด",c:["1 ขนาด","2 ขนาด","3 ขนาด","4 ขนาด"],a:1,ex:"ตราครุฑสำหรับแบบพิมพ์มี 2 ขนาด ตามมาตรฐานที่กำหนดไว้ในระเบียบฯ"},
{q:"'ส่วนราชการ' ตามนิยามในระเบียบฯ หมายรวมถึงอะไร",c:["เฉพาะกระทรวงและกรม","กระทรวง ทบวง กรม สำนักงาน หรือหน่วยงานอื่นใดของรัฐ ทั้งราชการส่วนกลาง ภูมิภาค ท้องถิ่น และในต่างประเทศ รวมถึงคณะกรรมการด้วย","เฉพาะส่วนราชการในราชการบริหารส่วนกลาง","กระทรวง ทบวง กรม และราชการส่วนภูมิภาคเท่านั้น"],a:1,ex:"'ส่วนราชการ' หมายถึง กระทรวง ทบวง กรม สำนักงาน หรือหน่วยงานอื่นใดของรัฐ ทั้งในราชการบริหารส่วนกลาง ส่วนภูมิภาค ส่วนท้องถิ่น หรือในต่างประเทศ และให้หมายความรวมถึงคณะกรรมการด้วย"},
{q:"'คณะกรรมการ' ตามระเบียบฯ หมายรวมถึงอะไร",c:["เฉพาะคณะกรรมการที่ตั้งโดยกฎหมาย","คณะบุคคลที่ได้รับมอบหมายจากทางราชการให้ปฏิบัติงาน รวมถึงคณะอนุกรรมการ คณะทำงาน","เฉพาะคณะกรรมการระดับกระทรวง","คณะกรรมการที่นายกรัฐมนตรีแต่งตั้งเท่านั้น"],a:1,ex:"'คณะกรรมการ' หมายถึง คณะบุคคลที่ได้รับมอบหมายจากทางราชการให้ปฏิบัติงานในเรื่องใดๆ และให้หมายความรวมถึงคณะอนุกรรมการ คณะทำงาน หรือคณะบุคคลอื่นที่ปฏิบัติงานในลักษณะเดียวกัน"},
{q:"ระเบียบฯ ฉบับนี้ใช้บังคับตั้งแต่วันใด",c:["1 มกราคม 2526","1 มิถุนายน 2526","1 ตุลาคม 2526","5 กันยายน 2526"],a:1,ex:"ระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ พ.ศ. 2526 ใช้บังคับตั้งแต่วันที่ 1 มิถุนายน 2526 เป็นต้นไป"},
{q:"ใครเป็นผู้รักษาการตามระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ",c:["นายกรัฐมนตรี","ปลัดสำนักนายกรัฐมนตรี","ปลัดกระทรวงมหาดไทย","เลขาธิการคณะรัฐมนตรี"],a:1,ex:"ปลัดสำนักนายกรัฐมนตรีเป็นผู้รักษาการตามระเบียบนี้ และมีอำนาจตีความ วินิจฉัยปัญหา รวมทั้งการแก้ไขเพิ่มเติมภาคผนวก"},
{q:"ส่วนราชการใดที่มีความจำเป็นต้องปฏิบัติงานสารบรรณนอกเหนือจากที่กำหนดไว้ต้องทำอย่างไร",c:["ออกระเบียบเองได้","ขอทำความตกลงกับผู้รักษาการตามระเบียบ","เสนอคณะรัฐมนตรีอนุมัติ","แจ้งกระทรวงเจ้าสังกัด"],a:1,ex:"ส่วนราชการใดมีความจำเป็นต้องปฏิบัติงานสารบรรณนอกเหนือจากที่กำหนดไว้ ให้ขอทำความตกลงกับผู้รักษาการตามระเบียบ (ปลัดสำนักนายกรัฐมนตรี)"},
{q:"หนังสือราชการภาษาอังกฤษต้องทำตามแบบที่กำหนดไว้ในภาคผนวกใด",c:["ภาคผนวก 1","ภาคผนวก 2","ภาคผนวก 3","ภาคผนวก 4"],a:3,ex:"หนังสือราชการที่เป็นภาษาอังกฤษ ให้ทำตามแบบที่กำหนดไว้ในภาคผนวก 4 สำหรับภาษาอื่นๆ ที่มิใช่ภาษาอังกฤษให้เป็นไปตามประเพณีนิยม"},
{q:"การลงชื่อและตำแหน่งในหนังสือราชการ ให้ปฏิบัติตามภาคผนวกใด",c:["ภาคผนวก 1","ภาคผนวก 2","ภาคผนวก 3","ภาคผนวก 4"],a:2,ex:"การลงชื่อและตำแหน่งในหนังสือราชการให้ปฏิบัติตามภาคผนวก 3 ของระเบียบฯ ซึ่งกำหนดหลักเกณฑ์การลงชื่อและตำแหน่งของผู้ออกหนังสือ"},
{q:"คำขึ้นต้นในหนังสือภายนอก ให้ใช้ตามอะไร",c:["ตามดุลพินิจของผู้ออกหนังสือ","ตามตารางการใช้คำขึ้นต้น สรรพนาม และคำลงท้าย ตามฐานะของผู้รับหนังสือ","ตามที่กฎหมายกำหนดเท่านั้น","ตามประเพณีนิยม"],a:1,ex:"คำขึ้นต้นในหนังสือภายนอกให้ใช้คำขึ้นต้นตามฐานะของผู้รับหนังสือ ตามตารางการใช้คำขึ้นต้น สรรพนาม และคำลงท้ายที่กำหนดไว้"},
{q:"รายการใดในหนังสือภายนอกที่ใช้ในกรณีส่งสำเนาไปให้ผู้อื่นทราบ",c:["อ้างถึง","สิ่งที่ส่งมาด้วย","สำเนาส่ง","หมายเหตุ"],a:2,ex:"'สำเนาส่ง (ถ้ามี)' ในหนังสือภายนอกใช้ในกรณีที่ผู้ส่งจัดทำสำเนาส่งไปให้ส่วนราชการหรือบุคคลอื่นทราบ และประสงค์จะให้ผู้รับทราบด้วยว่าได้มีสำเนาส่งไปให้ผู้ใดแล้ว"},
{q:"ในหนังสือภายนอก 'อ้างถึง' ให้อ้างถึงหนังสือฉบับใด",c:["หนังสือทุกฉบับที่เคยมีการติดต่อกัน","หนังสือฉบับสุดท้ายที่ติดต่อกันเพียงฉบับเดียว เว้นแต่มีเรื่องอื่นที่เป็นสาระสำคัญต้องนำมาพิจารณา","หนังสือฉบับแรกที่เริ่มเรื่อง","หนังสือทุกฉบับในรอบ 1 ปีที่ผ่านมา"],a:1,ex:"การอ้างถึงให้อ้างถึงหนังสือฉบับสุดท้ายที่ติดต่อกันเพียงฉบับเดียว เว้นแต่มีเรื่องอื่นที่เป็นสาระสำคัญต้องนำมาพิจารณา จึงอ้างถึงหนังสือฉบับอื่นๆ ที่เกี่ยวกับเรื่องนั้นโดยเฉพาะด้วย"},
{q:"หนังสือรับรองต้องใช้กระดาษชนิดใด",c:["กระดาษธรรมดา","กระดาษตราครุฑ","กระดาษบันทึกข้อความ","กระดาษตามที่ส่วนราชการกำหนด"],a:1,ex:"หนังสือรับรองต้องใช้กระดาษตราครุฑ เนื่องจากเป็นเอกสารทางราชการที่ออกให้เพื่อรับรองแก่บุคคล นิติบุคคล หรือหน่วยงาน"},
{q:"หนังสือรับรองที่ออกให้แก่บุคคลสำคัญต้องมีรูปถ่ายขนาดเท่าใด",c:["2×3 เซนติเมตร","3×4 เซนติเมตร","4×6 เซนติเมตร","5×7 เซนติเมตร"],a:2,ex:"ในกรณีที่การรับรองเป็นเรื่องสำคัญที่ออกให้แก่บุคคล ให้ติดรูปถ่ายของผู้ที่ได้รับการรับรองขนาด 4×6 เซนติเมตร หน้าตรง ไม่สวมหมวก"},
{q:"ในบัตรยืมหนังสือ รายการ 'ผู้รับ' หมายถึงอะไร",c:["ผู้ที่ยืมหนังสือ","ผู้ที่ได้รับหนังสือที่ยืมไปลงลายมือชื่อและวงเล็บชื่อกำกับพร้อมตำแหน่ง","หัวหน้าส่วนราชการที่อนุมัติ","เจ้าหน้าที่ผู้จัดเก็บหนังสือ"],a:1,ex:"ในบัตรยืมหนังสือ รายการ 'ผู้รับ' หมายถึง ผู้ที่ได้รับหนังสือที่ยืมไป ซึ่งต้องลงลายมือชื่อ และวงเล็บชื่อกำกับพร้อมด้วยตำแหน่งในบรรทัดถัดไป"},
{q:"หนังสืออิเล็กทรอนิกส์มีอายุการเก็บรักษาหรือไม่",c:["มีอายุเหมือนหนังสือกระดาษ คือ 10 ปี","ไม่มีอายุการเก็บรักษา โดยปกติให้เก็บไว้ตลอดไป","มีอายุ 5 ปี","มีอายุตามที่หัวหน้าส่วนราชการกำหนด"],a:1,ex:"หนังสืออิเล็กทรอนิกส์ไม่มีอายุการเก็บรักษา โดยปกติให้เก็บไว้ตลอดไป เว้นแต่กรณีจำเป็นต้องเพิ่มพื้นที่จัดเก็บในระบบสารบรรณอิเล็กทรอนิกส์ หรือมีเหตุผลความจำเป็นอื่นใด"},
{q:"การเก็บหนังสืออิเล็กทรอนิกส์ นอกจากเก็บในระบบสารบรรณอิเล็กทรอนิกส์แล้ว ต้องทำอะไรเพิ่ม",c:["พิมพ์เก็บเป็นกระดาษด้วย","สำรองข้อมูล (backup) ไว้อีกแห่งเป็นอย่างน้อย","เผยแพร่ไปยังหน่วยงานที่เกี่ยวข้อง","ไม่ต้องทำอะไรเพิ่ม"],a:1,ex:"นอกจากการเก็บไว้ในระบบสารบรรณอิเล็กทรอนิกส์แล้ว ให้มีการสำรองข้อมูล (backup) หนังสืออิเล็กทรอนิกส์ไว้อีกแห่งเป็นอย่างน้อยด้วย"},
{q:"หนังสืออิเล็กทรอนิกส์ที่ส่งให้สำนักหอจดหมายเหตุแห่งชาติต้องอยู่ในรูปแบบใดและความละเอียดเท่าใด",c:["Word Document ความละเอียดใดก็ได้","PDF ความละเอียดไม่น้อยกว่า 150 dpi","JPEG ความละเอียดไม่น้อยกว่า 300 dpi","ไฟล์รูปแบบมาตรฐานตามที่กรมศิลปากรกำหนด"],a:1,ex:"หนังสืออิเล็กทรอนิกส์ที่เก็บรักษาในการสำรองข้อมูลและที่ส่งให้สำนักหอจดหมายเหตุแห่งชาติ ให้อยู่ในรูปแบบมาตรฐาน เช่น PDF ความละเอียดไม่น้อยกว่า 150 dpi"},
{q:"การทำลายหนังสืออิเล็กทรอนิกส์ทำได้เมื่อใด",c:["เมื่อครบ 10 ปี","เมื่อหัวหน้าส่วนราชการมีคำสั่ง และต้องเก็บมาแล้วเกิน 20 ปี","ทุกสิ้นปีปฏิทิน","เมื่อพื้นที่ระบบไม่เพียงพอโดยไม่มีข้อจำกัด"],a:1,ex:"หัวหน้าส่วนราชการจะมีคำสั่งให้ทำลายหนังสืออิเล็กทรอนิกส์ที่มิใช่เอกสารจดหมายเหตุตามกฎหมาย ที่เก็บมาเป็นเวลาเกิน 20 ปีแล้วก็ได้"},
{q:"การส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์เสร็จสมบูรณ์ต้องมีองค์ประกอบอะไร",c:["แค่พิมพ์หนังสือและส่ง","การร่างหนังสือโดยวิธีที่สามารถระบุตัวตนและแสดงเจตนาของเจ้าของลายมือชื่อ ออกเลขที่หนังสือ บันทึกทะเบียนส่ง เก็บสำเนา และส่งหนังสือไปหน่วยงานผู้รับ","การส่งทาง email เท่านั้น","การสแกนเอกสารและแนบไฟล์"],a:1,ex:"การส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์ต้องประกอบด้วย การร่างหนังสือโดยวิธีที่ระบุตัวตนได้ การออกเลขที่หนังสือ การบันทึกลงทะเบียนส่ง การเก็บรักษาสำเนา และการส่งหนังสือไปหน่วยงานผู้รับ"},
{q:"หลังส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์แล้ว ส่วนราชการผู้ส่งต้องทำอะไรอีก",c:["ส่งหนังสือเป็นเอกสารตามไปด้วย","ตรวจสอบผลการส่งทุกครั้งเพื่อยืนยันว่าหนังสือจัดส่งไปยังผู้รับเรียบร้อยแล้ว และไม่ต้องส่งเป็นเอกสารอีก","แจ้งผู้รับว่าได้ส่งหนังสือแล้ว","ไม่ต้องทำอะไร"],a:1,ex:"เมื่อได้ส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์แล้ว ส่วนราชการผู้ส่งต้องตรวจสอบผลการส่งทุกครั้ง และไม่ต้องส่งหนังสือเป็นเอกสารอีก"},
{q:"หนังสือที่มีชั้นความลับ 'ลับที่สุด' ห้ามส่งด้วยวิธีใด",c:["ไปรษณีย์ลงทะเบียน","ระบบสารบรรณอิเล็กทรอนิกส์","พนักงานส่งสาร","ทุกวิธีที่กล่าวมา"],a:1,ex:"การติดต่อราชการให้ดำเนินการด้วยระบบสารบรรณอิเล็กทรอนิกส์เป็นหลัก เว้นแต่กรณีที่เป็นข้อมูลลับชั้นลับที่สุด ซึ่งต้องระมัดระวังเป็นพิเศษ"},
{q:"การประทับตรากำหนดเก็บหนังสือ ต้องประทับที่ตำแหน่งใด",c:["มุมบนด้านซ้ายของหนังสือ","มุมบนด้านขวาของหนังสือ","มุมล่างด้านขวาของกระดาษแผ่นแรกของหนังสือ","กลางหน้าหนังสือ"],a:2,ex:"ตรากำหนดเก็บหนังสือให้ประทับไว้ที่มุมล่างด้านขวาของกระดาษแผ่นแรกของหนังสือฉบับนั้น และลงลายมือชื่อย่อกำกับตรา"},
{q:"หนังสือที่ต้องเก็บไว้ตลอดไปห้ามทำลาย ต้องประทับตราคำว่าอะไร ด้วยหมึกสีใด",c:["'เก็บถาวร' ด้วยหมึกสีน้ำเงิน","'ห้ามทำลาย' ด้วยหมึกสีแดง","'เก็บตลอดไป' ด้วยหมึกสีดำ","'สำคัญ' ด้วยหมึกสีแดง"],a:1,ex:"หนังสือที่ต้องเก็บไว้ตลอดไปให้ประทับตราคำว่า 'ห้ามทำลาย' ด้วยหมึกสีแดง ส่วนหนังสือที่เก็บโดยมีกำหนดเวลาให้ประทับตราคำว่า 'เก็บถึง พ.ศ. ....' ด้วยหมึกสีน้ำเงิน"},
{q:"หนังสือที่เก็บโดยมีกำหนดเวลา ต้องประทับตราคำว่าอะไร ด้วยหมึกสีใด",c:["'เก็บชั่วคราว' ด้วยหมึกสีน้ำเงิน","'เก็บถึง พ.ศ. ....' ด้วยหมึกสีน้ำเงิน","'เก็บถึง พ.ศ. ....' ด้วยหมึกสีแดง","'กำหนดเวลา' ด้วยหมึกสีดำ"],a:1,ex:"หนังสือที่เก็บโดยมีกำหนดเวลาให้ประทับตราคำว่า 'เก็บถึง พ.ศ. ....' ด้วยหมึกสีน้ำเงิน และลงเลขของปีพุทธศักราชที่ให้เก็บถึง"},
{q:"การเก็บหนังสือระหว่างปฏิบัติ (ยังไม่เสร็จ) ควรอยู่ในความรับผิดชอบของใคร",c:["หน่วยงานสารบรรณกลาง","เจ้าของเรื่อง","หัวหน้าส่วนราชการ","เจ้าหน้าที่เก็บหนังสือ"],a:1,ex:"การเก็บหนังสือที่ยังอยู่ระหว่างปฏิบัติ (ยังไม่เสร็จ) ให้อยู่ในความรับผิดชอบของเจ้าของเรื่อง โดยให้กำหนดวิธีการเก็บให้เหมาะสมตามขั้นตอนของการปฏิบัติงาน"},
{q:"ทะเบียนหนังสือส่งต้องมีรายการอะไรบ้าง",c:["เลขทะเบียนส่ง ที่ ลงวันที่ จาก ถึง เรื่อง การปฏิบัติ หมายเหตุ","เลขทะเบียนส่ง ที่ วันที่ ผู้รับ","เลขทะเบียนส่ง เรื่อง วันที่","เลขทะเบียนส่ง จาก ถึง"],a:0,ex:"ทะเบียนหนังสือส่งต้องมี 7 รายการ ได้แก่ เลขทะเบียนส่ง ที่ ลงวันที่ จาก ถึง เรื่อง การปฏิบัติ และหมายเหตุ คล้ายกับทะเบียนหนังสือรับ"},
{q:"ระเบียบฯ กำหนดให้ส่วนราชการทำการสำรวจทะเบียนหนังสือรับเป็นประจำเพื่ออะไร",c:["นับจำนวนหนังสือที่ได้รับ","ตรวจสอบว่าหนังสือตามทะเบียนรับนั้นได้มีการปฏิบัติไปแล้วเพียงใด และให้มีการติดตามเรื่องด้วย","จัดลำดับความสำคัญ","เพื่อรายงานต่อผู้บังคับบัญชา"],a:1,ex:"ระเบียบฯ กำหนดให้มีการสำรวจทะเบียนหนังสือรับเป็นประจำ เพื่อตรวจสอบว่าหนังสือตามทะเบียนรับนั้นได้มีการปฏิบัติไปแล้วเพียงใด และให้มีการติดตามเรื่องด้วย"},
{q:"บัตรตรวจค้น (บัตรตรวจค้นหนังสือ) จะช่วยอะไร",c:["ป้องกันการสูญหายของหนังสือ","ช่วยในการค้นหาหนังสือรับและหนังสือส่ง","จัดลำดับความสำคัญของหนังสือ","ป้องกันการนำหนังสือออกนอกส่วนราชการ"],a:1,ex:"บัตรตรวจค้น (แบบที่ 18) ช่วยในการค้นหาหนังสือรับและหนังสือส่งเพื่อความสะดวก โดยจัดทำตามหมวดหมู่ของเรื่องและรหัส"},
{q:"หนังสือที่เจ้าของหนังสือเห็นว่าส่วนราชการอื่นที่เกี่ยวข้องควรได้รับทราบด้วย โดยปกติให้ทำอย่างไร",c:["ส่งหนังสือใหม่ไปยังส่วนราชการนั้น","ส่งสำเนาไปให้ทราบ โดยทำเป็นหนังสือประทับตรา","แจ้งด้วยวาจา","ฝากทางโทรศัพท์"],a:1,ex:"หนังสือที่เจ้าของหนังสือเห็นว่าส่วนราชการอื่นที่เกี่ยวข้องควรได้รับทราบด้วย โดยปกติให้ส่งสำเนาไปให้ทราบ โดยทำเป็นหนังสือประทับตรา"},
{q:"หนังสือของบุคคลภายนอกที่ยื่นต่อเจ้าหน้าที่และเจ้าหน้าที่ได้รับเข้าทะเบียนรับหนังสือของทางราชการแล้ว จัดเป็นหนังสือประเภทใด",c:["หนังสือภายนอก","หนังสือรับรอง","หนังสืออื่น","บันทึก"],a:2,ex:"หนังสือของบุคคลภายนอกที่ยื่นต่อเจ้าหน้าที่และเจ้าหน้าที่ได้รับเข้าทะเบียนรับหนังสือของทางราชการแล้ว จัดเป็น 'หนังสืออื่น' ซึ่งเป็นหนังสือที่เจ้าหน้าที่ทำขึ้นหรือรับไว้เป็นหลักฐานในราชการ"},
{q:"รายการใดต่อไปนี้ไม่ใช่ส่วนประกอบของรายงานการประชุม",c:["ผู้มาประชุม","ผู้ไม่มาประชุมพร้อมเหตุผล","เลขที่รับหนังสือ","ผู้จัดรายงานการประชุม"],a:2,ex:"รายงานการประชุมต้องมี ชื่อคณะที่ประชุม ครั้งที่ เมื่อ ณ ผู้มาประชุม ผู้ไม่มาประชุม ผู้เข้าร่วมประชุม เริ่มประชุมเวลา ข้อความ เลิกประชุมเวลา และผู้จัดรายงาน ไม่มีรายการเลขที่รับหนังสือ"},
{q:"ในการประชุม ถ้าประธานกรรมการไม่สามารถปฏิบัติหน้าที่ได้ ต้องทำอย่างไร",c:["เลื่อนการประชุม","กรรมการที่มาประชุมเลือกกรรมการคนหนึ่งทำหน้าที่ประธาน","รองประธานทำหน้าที่แทนอัตโนมัติ","ให้เลขานุการทำหน้าที่แทน"],a:1,ex:"ถ้าประธานกรรมการไม่สามารถปฏิบัติหน้าที่ได้ ให้กรรมการที่มาประชุมเลือกกรรมการคนหนึ่งทำหน้าที่ประธาน มติของคณะกรรมการให้ถือเสียงข้างมาก"},
{q:"ถ้ากรรมการทำลายหนังสือคนใดไม่เห็นด้วยกับมติคณะกรรมการ ต้องทำอย่างไร",c:["ยื่นลาออกจากการเป็นกรรมการ","ทำบันทึกความเห็นแย้งไว้","ไม่ต้องทำอะไร","รายงานต่ออธิบดีโดยตรง"],a:1,ex:"ถ้ากรรมการผู้ใดไม่เห็นด้วย ให้ทำบันทึกความเห็นแย้งไว้ เพื่อแสดงจุดยืนและความรับผิดชอบส่วนตัว และเป็นหลักฐานประกอบการพิจารณาของผู้มีอำนาจอนุมัติ"},
{q:"คณะกรรมการทำลายหนังสือมีหน้าที่อะไรบ้าง (ข้อที่ถูกต้องที่สุด)",c:["พิจารณาหนังสือและเสนอรายงานผลต่อหัวหน้าส่วนราชการระดับกรม","เพียงนับจำนวนหนังสือที่จะทำลาย","ตัดสินใจทำลายหนังสือได้เลยโดยไม่ต้องเสนอ","ส่งหนังสือทุกฉบับให้กองจดหมายเหตุแห่งชาติ"],a:0,ex:"คณะกรรมการทำลายหนังสือมีหน้าที่พิจารณาหนังสือที่จะขอทำลาย เสนอรายงานผลการพิจารณาพร้อมบันทึกความเห็นแย้ง (ถ้ามี) ต่อหัวหน้าส่วนราชการระดับกรม และควบคุมการทำลายหนังสือที่ผู้มีอำนาจอนุมัติแล้ว"},
{q:"หนังสือที่ฝากเก็บไว้ที่กองจดหมายเหตุแห่งชาติ กรมศิลปากร ถือเป็นหนังสือของใคร",c:["ของกองจดหมายเหตุแห่งชาติ","ของส่วนราชการผู้ฝาก","ของรัฐ","เป็นสมบัติสาธารณะ"],a:1,ex:"หนังสือที่ฝากเก็บไว้ที่กองจดหมายเหตุแห่งชาติ กรมศิลปากร ให้ถือว่าเป็นหนังสือของส่วนราชการผู้ฝาก หากต้องการใช้หรือขอคืน ก็สามารถทำได้โดยจัดทำหลักฐานต่อกัน"},
{q:"หนังสือที่สูญหายและเป็นเอกสารสิทธิตามกฎหมาย ต้องดำเนินการอย่างไร",c:["รายงานผู้บังคับบัญชาเท่านั้น","ดำเนินการแจ้งความต่อพนักงานสอบสวน","ออกหนังสือใหม่ทดแทน","หมายเหตุไว้ในทะเบียนเก็บ"],a:1,ex:"ถ้าหนังสือที่สูญหายเป็นเอกสารสิทธิตามกฎหมายหรือหนังสือสำคัญที่เป็นการแสดงเอกสารสิทธิ ให้ดำเนินการแจ้งความต่อพนักงานสอบสวน นอกจากนั้นต้องหมายเหตุไว้ในทะเบียนเก็บด้วย"},
{q:"หากหนังสือชำรุดเสียหายจนไม่สามารถซ่อมแซมได้ ต้องทำอย่างไร",c:["ทำลายทันที","รายงานผู้บังคับบัญชาทราบและหมายเหตุไว้ในทะเบียนเก็บ","ออกหนังสือใหม่ทดแทนทันที","ส่งให้กองจดหมายเหตุ"],a:1,ex:"ถ้าชำรุดเสียหายจนไม่สามารถซ่อมแซมให้คงสภาพเดิมได้ ให้รายงานผู้บังคับบัญชาทราบ และหมายเหตุไว้ในทะเบียนเก็บด้วย"},
{q:"ทะเบียนหรือบัญชีอิเล็กทรอนิกส์สามารถจัดทำโดยใช้โปรแกรมอะไรได้บ้าง",c:["เฉพาะโปรแกรมที่สำนักนายกรัฐมนตรีกำหนด","Microsoft Excel, Google Sheets, Apple Numbers หรือแอปพลิเคชันอื่นใดก็ได้","เฉพาะระบบ GFMIS ของกระทรวงการคลัง","เฉพาะระบบสารบรรณอิเล็กทรอนิกส์ที่รัฐบาลจัดหาให้"],a:1,ex:"ทะเบียนหรือบัญชีอิเล็กทรอนิกส์จะอยู่ในระบบสารบรรณอิเล็กทรอนิกส์ หรือจัดทำโดยใช้โปรแกรม เช่น Microsoft Excel หรือ Google Sheets หรือ Apple Numbers หรือแอปพลิเคชันอื่นใดก็ได้"},
{q:"ในสมุดส่งหนังสือ รายการ 'หน่วยรับ' หมายถึงอะไร",c:["ชื่อบุคคลที่รับหนังสือ","ชื่อส่วนราชการที่รับหนังสือ","เลขที่รับของผู้รับ","ชื่อห้องรับหนังสือ"],a:1,ex:"ในสมุดส่งหนังสือ รายการ 'หน่วยรับ' ให้ลงชื่อส่วนราชการที่รับหนังสือ ส่วน 'ผู้รับ' ให้ผู้รับหนังสือลงชื่อที่สามารถอ่านออกได้"},
{q:"การส่งหนังสือทางไปรษณีย์ ก่อนบรรจุซองต้องทำอะไร",c:["ลงทะเบียนส่งก่อน","เจ้าหน้าที่ตรวจความเรียบร้อยของหนังสือและสิ่งที่ส่งไปด้วยแล้วปิดผนึก","ประทับตรา","จ่าหน้าซองก่อน"],a:1,ex:"ก่อนบรรจุซองส่งทางไปรษณีย์ ให้เจ้าหน้าที่ตรวจความเรียบร้อยของหนังสือและสิ่งที่ส่งไปด้วยแล้วปิดผนึก จากนั้นจึงจ่าหน้าซองตามแบบที่ 15"},
{q:"การส่งหนังสือทางไปรษณีย์ต้องถือปฏิบัติตามอะไร",c:["ตามระเบียบของกระทรวงการคลัง","ตามระเบียบหรือวิธีการที่การสื่อสารแห่งประเทศไทยกำหนด","ตามที่ส่วนราชการกำหนดเอง","ตามมาตรฐานสากล"],a:1,ex:"การส่งหนังสือโดยไปรษณีย์ให้ถือปฏิบัติตามระเบียบหรือวิธีการที่การสื่อสารแห่งประเทศไทยกำหนด"},
{q:"'หนังสืออิเล็กทรอนิกส์' ตามระเบียบฯ หมายถึงอะไร",c:["หนังสือที่พิมพ์ด้วยคอมพิวเตอร์","หนังสือราชการที่จัดทำและได้รับ ส่ง หรือเก็บรักษาด้วยระบบสารบรรณอิเล็กทรอนิกส์","การส่งหนังสือทาง Email เท่านั้น","หนังสือที่สแกนเป็นไฟล์ดิจิทัล"],a:1,ex:"'หนังสืออิเล็กทรอนิกส์' หมายถึง หนังสือราชการที่จัดทำและได้รับ ส่ง หรือเก็บรักษาด้วยระบบสารบรรณอิเล็กทรอนิกส์"},
{q:"'อิเล็กทรอนิกส์' ตามระเบียบฯ หมายความรวมถึงอะไรบ้าง",c:["เฉพาะวิธีการทางไฟฟ้า","การประยุกต์ใช้วิธีการทางอิเล็กตรอน ไฟฟ้า คลื่นแม่เหล็กไฟฟ้า รวมถึงวิธีการทางแสง วิธีการทางแม่เหล็ก หรืออุปกรณ์ที่เกี่ยวข้อง","เฉพาะคอมพิวเตอร์","เฉพาะอินเทอร์เน็ต"],a:1,ex:"'อิเล็กทรอนิกส์' หมายถึง การประยุกต์ใช้วิธีการทางอิเล็กตรอน ไฟฟ้า คลื่นแม่เหล็กไฟฟ้า หรือวิธีอื่นใดในลักษณะคล้ายกัน รวมถึงวิธีการทางแสง วิธีการทางแม่เหล็ก หรืออุปกรณ์ที่เกี่ยวข้อง"},
{q:"การเก็บหนังสือแบ่งเป็นกี่ลักษณะ",c:["2 ลักษณะ","3 ลักษณะ","4 ลักษณะ","5 ลักษณะ"],a:1,ex:"การเก็บหนังสือแบ่งเป็น 3 ลักษณะ คือ 1.การเก็บระหว่างปฏิบัติ 2.การเก็บเมื่อปฏิบัติเสร็จแล้ว 3.การเก็บไว้เพื่อใช้ในการตรวจสอบ"},
{q:"การเก็บหนังสือไว้เพื่อใช้ในการตรวจสอบเป็นประจำ แต่ไม่สะดวกส่งไปหน่วยเก็บ ให้ทำอย่างไร",c:["ส่งให้หน่วยงานสารบรรณกลางเก็บ","เจ้าของเรื่องเก็บเป็นเอกเทศ โดยแต่งตั้งเจ้าหน้าที่รับผิดชอบ","ทำลายได้เลย","เก็บรวมกับหนังสือปกติ"],a:1,ex:"การเก็บหนังสือที่ปฏิบัติเสร็จแล้วแต่จำเป็นต้องใช้ตรวจสอบเป็นประจำ ไม่สะดวกส่งไปหน่วยเก็บ ให้เจ้าของเรื่องเก็บเป็นเอกเทศ โดยแต่งตั้งเจ้าหน้าที่รับผิดชอบ เมื่อหมดความจำเป็นแล้วจึงส่งหน่วยเก็บ"},
{q:"คำสั่งเลขที่ของหนังสือเริ่มนับจากเลขใดและนับถึงเมื่อใด",c:["เริ่มจาก 1 ทุกวันที่ 1 มกราคม","เริ่มจาก 1 เรียงเป็นลำดับไปจนสิ้นปีปฏิทิน ทับเลขปีพุทธศักราช","เริ่มจากเลขต่อเนื่องจากปีก่อน","กำหนดเองตามความเหมาะสม"],a:1,ex:"คำสั่งให้ลงเลขที่ที่ออกคำสั่ง โดยเริ่มฉบับแรกจากเลข 1 เรียงเป็นลำดับไปจนสิ้นปีปฏิทิน ทับเลขปีพุทธศักราชที่ออกคำสั่ง เช่น 1/2567"},
{q:"ระเบียบที่มีการแก้ไขเพิ่มเติมในเรื่องเดิม ต้องลงว่าเป็นฉบับที่เท่าใด",c:["ไม่ต้องลงฉบับที่","ลงว่าเป็นฉบับที่ 2 และที่ถัดๆ ไปตามลำดับ","ลงว่าเป็นฉบับแก้ไข","ขึ้นอยู่กับผู้ออกระเบียบ"],a:1,ex:"ระเบียบที่กล่าวถึงเป็นครั้งแรกในเรื่องนั้น ไม่ต้องลงว่าเป็นฉบับที่เท่าใด แต่ถ้าเป็นระเบียบเรื่องเดียวกันที่มีการแก้ไขเพิ่มเติม ให้ลงเป็นฉบับที่ 2 และถัดๆ ไปตามลำดับ"},
{q:"ข้อสุดท้ายของระเบียบและข้อบังคับต้องเป็นเรื่องอะไร",c:["วันใช้บังคับ","ผู้รักษาการ","บทกำหนดโทษ","วันประกาศ"],a:1,ex:"ข้อสุดท้ายของระเบียบและข้อบังคับต้องเป็นข้อผู้รักษาการ (กำหนดว่าใครเป็นผู้รักษาการตามระเบียบ/ข้อบังคับนั้น)"},
{q:"ผู้ยืมหนังสือต้องแจ้งให้ทราบว่าอะไร",c:["เหตุผลส่วนตัว","เรื่องที่ยืมนั้นจะนำไปใช้ในราชการใด","ระยะเวลาที่จะใช้","ชื่อผู้ที่จะอ่านหนังสือ"],a:1,ex:"ผู้ยืมจะต้องแจ้งให้ทราบว่าเรื่องที่ยืมนั้นจะนำไปใช้ในราชการใด เพื่อเป็นหลักฐานว่ายืมไปใช้ประโยชน์ราชการจริง"},
{q:"บัตรยืมหนังสือต้องเก็บไว้ที่ใด",c:["ส่งให้หัวหน้าส่วนราชการ","เก็บไว้แทนที่หนังสือที่ถูกยืมไป","เก็บไว้ที่หน่วยงานของผู้ยืม","เก็บรวมกับทะเบียนหนังสือรับ"],a:1,ex:"บัตรยืมหนังสือให้เก็บไว้แทนที่หนังสือที่ถูกยืมไป เพื่อแสดงว่าหนังสือฉบับนั้นถูกยืมออกไปและอยู่ที่ใคร"},
{q:"ระเบียบฯ นี้ยกเลิกระเบียบฉบับใด",c:["ระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ พ.ศ. 2506 และที่เกี่ยวข้อง","ระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ พ.ศ. 2520","กฎกระทรวงว่าด้วยงานสารบรรณ","ประกาศสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ"],a:0,ex:"ระเบียบฯ พ.ศ. 2526 ยกเลิกระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ พ.ศ. 2506 ระเบียบสำนักนายกรัฐมนตรีว่าด้วยการลงชื่อในหนังสือราชการ พ.ศ. 2507 และ พ.ศ. 2561"},
{q:"ข้อใดต่อไปนี้ถูกต้องเกี่ยวกับการส่งสำเนาหนังสืออิเล็กทรอนิกส์",c:["ต้องพิมพ์ออกมาและส่งสำเนากระดาษด้วยทุกครั้ง","หนังสือที่หน่วยงานสารบรรณกลางได้ส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์แล้ว ให้ถือว่าเป็นการเก็บสำเนาหนังสือไว้ในระบบ ไม่ต้องเก็บเป็นเอกสารอีก","ต้องสำเนาให้ทุกหน่วยงานในกระทรวง","สำเนาอิเล็กทรอนิกส์ไม่มีผลทางกฎหมาย"],a:1,ex:"หนังสือที่หน่วยงานสารบรรณกลางได้ส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์แล้ว ให้ถือว่าเป็น 'การเก็บสำเนาหนังสือ' ไว้ในระบบอิเล็กทรอนิกส์ โดยไม่ต้องเก็บเป็นเอกสารอีก"},
{q:"การส่งสำเนาหนังสือโดยปกติให้ทำอย่างไร",c:["ส่งต้นฉบับไปแล้วถ่ายสำเนาใหม่","ส่งสำเนาไปให้ทราบ โดยทำเป็นหนังสือประทับตรา","ส่งสำเนาโดยหนังสือภายนอก","ส่งสำเนาโดยบันทึก"],a:1,ex:"หนังสือที่เจ้าของหนังสือเห็นว่าส่วนราชการอื่นที่เกี่ยวข้องควรได้รับทราบด้วย โดยปกติให้ส่งสำเนาไปให้ทราบ โดยทำเป็นหนังสือประทับตรา"},
{q:"ถ้าส่วนราชการได้รับการแจ้งตอบรับจากผู้รับหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์แล้ว ต้องทำอะไรอีกหรือไม่",c:["ต้องส่งหนังสือเป็นเอกสารตามไปด้วย","ไม่ต้องจัดส่งหนังสือเป็นเอกสารตามไปอีก","ต้องยืนยันทางโทรศัพท์ด้วย","ต้องส่งหนังสือยืนยันอีกครั้ง"],a:1,ex:"ถ้าได้รับการแจ้งตอบรับแล้ว ส่วนราชการผู้ส่งไม่ต้องจัดส่งหนังสือเป็นเอกสารตามไปอีก เป็นการลดขั้นตอนการทำงาน"},
{q:"ข้อใดถูกต้องเกี่ยวกับหนังสือสั่งการ",c:["คำสั่ง ระเบียบ และข้อบังคับใช้กระดาษตราครุฑเหมือนกันทุกประเภท","คำสั่งไม่ต้องอาศัยอำนาจกฎหมายก็ได้ ระเบียบจะอาศัยหรือไม่ก็ได้ แต่ข้อบังคับต้องอาศัยอำนาจกฎหมายที่บัญญัติให้กระทำได้เสมอ","ระเบียบต้องอาศัยอำนาจกฎหมาย แต่คำสั่งไม่ต้อง","ข้อบังคับออกได้โดยไม่ต้องอาศัยอำนาจกฎหมาย"],a:1,ex:"คำสั่งไม่จำเป็นต้องอาศัยอำนาจกฎหมาย ขอให้ผู้บังคับบัญชาออกคำสั่งชอบด้วยกฎหมายก็พอ ระเบียบจะอาศัยอำนาจกฎหมายหรือไม่ก็ได้ แต่ข้อบังคับต้องอาศัยอำนาจกฎหมายที่บัญญัติให้กระทำได้เสมอ"},
{q:"บันทึกที่จัดทำในระบบสารบรรณอิเล็กทรอนิกส์ จะพิมพ์ชื่อผู้บันทึกแทนการลงลายมือชื่อได้หรือไม่",c:["ไม่ได้ ต้องลงลายมือชื่อเสมอ","ได้ ในกรณีที่มีการยืนยันตัวตน และไม่ต้องลงวันเดือนปีถ้าระบบมีการบันทึกไว้แล้ว","ได้ แต่ต้องลงวันเดือนปีเสมอ","ได้เฉพาะกรณีเร่งด่วน"],a:1,ex:"ในกรณีที่บันทึกจัดทำในระบบสารบรรณอิเล็กทรอนิกส์หรือโดยการพิมพ์ข้อความในไปรษณีย์อิเล็กทรอนิกส์หรือระบบสื่อสารอื่นใดที่มีการยืนยันตัวตน จะพิมพ์ชื่อผู้บันทึกแทนการลงลายมือชื่อก็ได้ และจะไม่ลงวันเดือนปีก็ได้หากระบบมีการบันทึกวันเดือนปีไว้อยู่แล้ว"},
{q:"ผู้ส่งหนังสือด้วยระบบสารบรรณอิเล็กทรอนิกส์มีหน้าที่อะไร",c:["แค่ส่งหนังสือแล้วก็ไม่มีหน้าที่ใดอีก","ตรวจสอบผลการส่งทุกครั้ง","รอให้ผู้รับโทรศัพท์ยืนยัน","ส่งหนังสือกระดาษตาม"],a:1,ex:"ผู้ส่งต้องตรวจสอบผลการส่งทุกครั้ง เพื่อยืนยันว่าหนังสือได้จัดส่งไปยังผู้รับเรียบร้อยแล้ว ระบบต้องแสดงผลโดยอัตโนมัติในระบบของผู้ส่งกรณีที่ไม่สามารถส่งหนังสือไปยังผู้รับได้"},
{q:"ข้อใดต่อไปนี้ไม่ใช่กรณีที่ใช้หนังสือประทับตรา",c:["ขอรายละเอียดเพิ่มเติม","ส่งสำเนาหนังสือ","แจ้งคำสั่งแต่งตั้งอธิบดี","เตือนเรื่องที่ค้าง"],a:2,ex:"หนังสือประทับตราใช้สำหรับกรณีที่ไม่ใช่เรื่องสำคัญ 6 กรณี แต่การแจ้งคำสั่งแต่งตั้งอธิบดีเป็นเรื่องสำคัญจึงต้องใช้หนังสือภายนอก"},
{q:"ข้อใดต่อไปนี้ถูกต้องเกี่ยวกับชั้นความลับ",c:["ชั้นความลับของหนังสือมี 2 ชั้น คือ ลับ และลับมาก","ชั้นความลับของหนังสือมี 3 ชั้น คือ ลับ ลับมาก และลับที่สุด","ชั้นความลับกำหนดโดยผู้รับหนังสือ","หนังสือธรรมดาทุกฉบับต้องกำหนดชั้นความลับ"],a:1,ex:"ชั้นความลับของหนังสือราชการมี 3 ชั้น ได้แก่ ลับที่สุด ลับมาก และลับ โดยการรักษาความลับให้ปฏิบัติตามกฎหมายว่าด้วยการรักษาความปลอดภัยแห่งชาติหรือระเบียบว่าด้วยการรักษาความลับของทางราชการ"},
{q:"หนังสือที่เป็นหลักฐานทางอรรถคดีหรือสำนวนของศาล ให้เก็บอย่างไร",c:["เก็บไม่น้อยกว่า 10 ปี","เก็บไม่น้อยกว่า 20 ปี","เก็บให้เป็นไปตามกฎหมายและระเบียบแบบแผนว่าด้วยการนั้น","เก็บจนกว่าคดีจะสิ้นสุด"],a:2,ex:"หนังสือที่เป็นหลักฐานทางอรรถคดี สำนวนของศาล หรือของพนักงานสอบสวน หรือหนังสืออื่นใดที่มีกฎหมายหรือระเบียบแบบแผนกำหนดไว้เป็นพิเศษแล้ว ให้เก็บให้เป็นไปตามกฎหมายและระเบียบแบบแผนว่าด้วยการนั้น"},
{q:"ข้อใดคือความแตกต่างที่ถูกต้องระหว่างสำเนาคู่ฉบับกับสำเนา",c:["สำเนาคู่ฉบับจัดทำพร้อมต้นฉบับและเหมือนต้นฉบับ ส่วนสำเนาจัดทำขึ้นภายหลัง","สำเนาคู่ฉบับใช้กระดาษสี สำเนาใช้กระดาษขาว","สำเนาคู่ฉบับไม่ต้องรับรอง สำเนาต้องรับรองเสมอ","สำเนาคู่ฉบับส่งให้ผู้รับ สำเนาเก็บไว้ที่ต้นเรื่อง"],a:0,ex:"สำเนาคู่ฉบับเป็นสำเนาที่จัดทำพร้อมกับต้นฉบับและเหมือนต้นฉบับ ผู้ลงลายมือชื่อในต้นฉบับจะลงลายมือชื่อหรือลายมือชื่อย่อไว้ ส่วนสำเนาเป็นสำเนาที่ส่วนราชการหรือเจ้าหน้าที่จัดทำขึ้นภายหลัง"},
{q:"ปลัดสำนักนายกรัฐมนตรีในฐานะผู้รักษาการ มีอำนาจทำอะไรได้บ้าง",c:["เฉพาะตีความและวินิจฉัยปัญหาเท่านั้น","มีอำนาจตีความ วินิจฉัยปัญหาเกี่ยวกับการปฏิบัติตามระเบียบนี้ รวมทั้งการแก้ไขเพิ่มเติมภาคผนวก","แก้ไขระเบียบหลักได้","ออกกฎหมายลูกได้"],a:1,ex:"ปลัดสำนักนายกรัฐมนตรีในฐานะผู้รักษาการ มีอำนาจตีความและวินิจฉัยปัญหาเกี่ยวกับการปฏิบัติตามระเบียบนี้ รวมทั้งการแก้ไขเพิ่มเติมภาคผนวก และจัดทำคำอธิบาย มีหน้าที่ดำเนินการฝึกอบรมเกี่ยวกับงานสารบรรณ"},
{q:"ข้อใดต่อไปนี้ถูกต้องเกี่ยวกับการเก็บหนังสือคู่สัญญาที่เกี่ยวกับการเงิน",c:["เก็บ 5 ปีเสมอ","ถ้าเห็นว่าไม่มีความจำเป็นต้องเก็บถึง 10 ปีหรือ 5 ปีแล้วแต่กรณี ให้ทำความตกลงกับกระทรวงการคลัง","เก็บตลอดไป","เก็บ 1 ปีเสมอ"],a:1,ex:"หนังสือเกี่ยวกับการเงินซึ่งเห็นว่าไม่มีความจำเป็นต้องเก็บไว้ถึง 10 ปีหรือ 5 ปีแล้วแต่กรณี ให้ทำความตกลงกับกระทรวงการคลัง"},

let answers=new Array(QS.length).fill(null),submitted=false,currentFilter='all';
const L=['ก','ข','ค','ง'];

function updateStats(){
  let c=0,w=0,r=0;
  answers.forEach((a,i)=>{if(a===null)r++;else if(a===QS[i].a)c++;else w++;});
  document.getElementById('s-correct').textContent=c;
  document.getElementById('s-wrong').textContent=w;
  document.getElementById('s-remain').textContent=r;
  const done=QS.length-r;
  document.getElementById('prog').style.width=(done/QS.length*100).toFixed(1)+'%';
  document.getElementById('prog-lbl').textContent=done+' / '+QS.length+' ข้อ';
}

function setFilter(f){
  currentFilter=f;
  ['all','wrong','unanswered'].forEach(x=>document.getElementById('f-'+x).classList.toggle('act',x===f));
  renderList();
}

function renderList(){
  const el=document.getElementById('qlist');
  let html='',shown=0;
  QS.forEach((q,i)=>{
    const ans=answers[i],isC=ans===q.a,isW=ans!==null&&!isC,isU=ans===null;
    if(currentFilter==='wrong'&&!isW)return;
    if(currentFilter==='unanswered'&&!isU)return;
    shown++;
    let cc='qc';
    if(submitted&&ans!==null)cc+=isC?' cs':' ws';
    else if(!submitted&&ans!==null)cc+=' ans';
    html+=`<div class="${cc}" id="qcard-${i}">`;
    html+=`<div class="qt"><span class="qb">${i+1}</span><span class="qtx">${q.q}</span>`;
    if(submitted&&ans!==null)html+=`<span class="rtag ${isC?'ok':'no'}">${isC?'✓ ถูก':'✗ ผิด'}</span>`;
    html+=`</div><div class="choices">`;
    q.c.forEach((ch,ci)=>{
      let cls='ch';
      if(ans===ci){if(!submitted)cls+=' sel';else if(isC)cls+=' ca';else cls+=' wa';}
      if(submitted&&ci===q.a&&ans!==q.a)cls+=' ca';
      html+=`<div class="${cls}" onclick="answer(${i},${ci})"><span class="cl">${L[ci]}.</span><span>${ch}</span></div>`;
    });
    html+=`</div>`;
    if(submitted)html+=`<div class="exp show"><strong>✦ เฉลย ตัวเลือก ${L[q.a]}:</strong> ${q.ex}</div>`;
    html+=`</div>`;
  });
  el.innerHTML=shown?html:'<div class="empty">ไม่พบข้อที่ตรงกับเงื่อนไขที่เลือก</div>';
}

function answer(qi,ci){
  if(submitted)return;
  answers[qi]=ci;
  updateStats();
  const card=document.getElementById('qcard-'+qi);
  if(card){
    card.classList.add('ans');
    card.querySelectorAll('.ch').forEach((ch,idx)=>{ch.classList.remove('sel');if(idx===ci)ch.classList.add('sel');});
  }
}

function submitAll(){
  submitted=true;
  let c=0;
  answers.forEach((a,i)=>{if(a===QS[i].a)c++;});
  const pct=c/QS.length*100;
  let msg=pct>=80?'🎉 ยอดเยี่ยม! ผ่านเกณฑ์ด้วยคะแนนสูง':pct>=60?'✅ ผ่านเกณฑ์ ควรทบทวนข้อที่ผิด':pct>=50?'⚠️ ใกล้ผ่านเกณฑ์ ต้องทบทวนเพิ่มเติม':'❌ ควรทบทวนเนื้อหาให้มากขึ้น';
  const sc=document.getElementById('score-card');
  sc.classList.add('show');
  document.getElementById('score-num').textContent=c+'/'+QS.length;
  document.getElementById('score-msg').textContent=msg;
  setTimeout(()=>document.getElementById('score-fill').style.width=pct.toFixed(1)+'%',100);
  updateStats();renderList();
  sc.scrollIntoView({behavior:'smooth'});
}

function resetAll(){
  answers=new Array(QS.length).fill(null);submitted=false;
  document.getElementById('score-card').classList.remove('show');
  document.getElementById('score-fill').style.width='0%';
  updateStats();setFilter('all');
}

updateStats();renderList();
</script>
</body>
</html>
