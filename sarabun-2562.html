<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อสอบระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ 50 ข้อ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600;700&display=swap');

  :root {
    --navy: #0d1b3e;
    --royal: #1a3a7a;
    --gold: #c9a227;
    --gold-light: #f0d060;
    --cream: #fdf8ed;
    --red: #c0392b;
    --green: #1a6b3c;
    --gray: #e8eaf0;
    --text: #1c1c2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .exam-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--royal) 60%, #2c5282 100%);
    padding: 32px 24px 28px;
    text-align: center;
    border-bottom: 4px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .exam-header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(201,162,39,0.04) 20px, rgba(201,162,39,0.04) 40px);
  }
  .exam-header h1 {
    font-family: 'Prompt', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
    position: relative;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .exam-header h2 {
    font-family: 'Prompt', sans-serif;
    font-size: 1.0rem;
    font-weight: 400;
    color: var(--gold-light);
    margin-top: 8px;
    position: relative;
  }
  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 1px;
    position: relative;
  }

  /* Score board */
  .scoreboard {
    background: #fff;
    border-bottom: 3px solid var(--gold);
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .score-item {
    text-align: center;
  }
  .score-item .label {
    font-size: 0.72rem;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-item .value {
    font-family: 'Prompt', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--navy);
  }
  .score-item.correct .value { color: var(--green); }
  .score-item.wrong .value { color: var(--red); }
  .score-item.total .value { color: var(--royal); }

  /* Main content */
  .exam-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* Question card */
  .question-card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 2px solid transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .question-card.answered-correct {
    border-color: var(--green);
    box-shadow: 0 4px 20px rgba(26,107,60,0.18);
  }
  .question-card.answered-wrong {
    border-color: var(--red);
    box-shadow: 0 4px 20px rgba(192,57,43,0.18);
  }

  .question-header {
    background: linear-gradient(90deg, var(--navy) 0%, var(--royal) 100%);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .question-number {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .question-text {
    color: #fff;
    font-size: 0.98rem;
    line-height: 1.6;
    font-weight: 600;
  }

  /* Options */
  .options-list {
    padding: 14px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 2px solid #d0d6e8;
    border-radius: 8px;
    background: var(--cream);
    cursor: pointer;
    text-align: left;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.93rem;
    line-height: 1.5;
    color: var(--text);
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--royal);
    background: #eef1fa;
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct-answer {
    border-color: var(--green);
    background: #eafaf1;
    color: var(--green);
    font-weight: 600;
  }
  .option-btn.wrong-answer {
    border-color: var(--red);
    background: #fef0ee;
    color: var(--red);
  }
  .option-letter {
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--royal);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-btn.correct-answer .option-letter {
    background: var(--green);
  }
  .option-btn.wrong-answer .option-letter {
    background: var(--red);
  }

  /* Explanation */
  .explanation {
    display: none;
    margin: 0 18px 16px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%);
    border-radius: 8px;
    border-left: 4px solid var(--gold);
    font-size: 0.88rem;
    line-height: 1.7;
    color: #2d3748;
  }
  .explanation.show { display: block; }
  .explanation strong {
    color: var(--navy);
    font-weight: 700;
  }
  .explanation .answer-label {
    font-family: 'Prompt', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    display: block;
  }

  /* Result summary */
  .result-bar {
    display: none;
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    margin: 32px 0 0;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    border: 3px solid var(--gold);
  }
  .result-bar.show { display: block; }
  .result-bar h2 {
    font-family: 'Prompt', sans-serif;
    font-size: 1.5rem;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-score {
    font-family: 'Prompt', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--royal);
    line-height: 1;
    margin: 16px 0 8px;
  }
  .result-grade {
    font-size: 1.1rem;
    font-weight: 600;
    padding: 6px 20px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 10px;
  }
  .reset-btn {
    margin-top: 20px;
    padding: 12px 32px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .reset-btn:hover { background: var(--gold-light); transform: scale(1.04); }

  /* Progress bar */
  .progress-wrap {
    background: #d0d6e8;
    border-radius: 8px;
    height: 8px;
    margin: 8px 24px 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--green));
    border-radius: 8px;
    transition: width 0.5s;
    width: 0%;
  }
  .progress-label {
    font-size: 0.75rem;
    color: #888;
    text-align: right;
    padding: 2px 24px 0;
    font-weight: 600;
  }

  @media (max-width: 600px) {
    .exam-header h1 { font-size: 1.2rem; }
    .scoreboard { gap: 18px; padding: 12px 16px; }
    .score-item .value { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="exam-header">
  <div class="badge">📋 ข้อสอบปรนัย 4 ตัวเลือก</div>
  <h1>ระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณ<br>พ.ศ. 2526 และที่แก้ไขเพิ่มเติม</h1>
  <h2>50 ข้อ เน้นยาก-ละเอียด พร้อมเฉลยและคำอธิบาย</h2>
</div>

<div class="scoreboard">
  <div class="score-item total">
    <div class="label">ตอบแล้ว</div>
    <div class="value" id="answered">0</div>
  </div>
  <div class="score-item correct">
    <div class="label">✓ ถูก</div>
    <div class="value" id="correct-count">0</div>
  </div>
  <div class="score-item wrong">
    <div class="label">✗ ผิด</div>
    <div class="value" id="wrong-count">0</div>
  </div>
  <div class="score-item">
    <div class="label">คะแนน</div>
    <div class="value" id="score-pct" style="color:var(--gold)">-</div>
  </div>
</div>
<div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
<div class="progress-label" id="progress-label">0 / 50</div>

<div class="exam-body" id="exam-body"></div>

<script>
const questions = [
  {
    q: "หนังสือราชการตามระเบียบสำนักนายกรัฐมนตรีว่าด้วยงานสารบรรณมีกี่ชนิด",
    opts: ["4 ชนิด","5 ชนิด","6 ชนิด","7 ชนิด"],
    ans: 2,
    explain: "หนังสือราชการมี <strong>6 ชนิด</strong> ได้แก่ (1) หนังสือภายนอก (2) หนังสือภายใน (3) หนังสือประทับตรา (4) หนังสือสั่งการ (5) หนังสือประชาสัมพันธ์ (6) หนังสือที่เจ้าหน้าที่ทำขึ้นหรือรับไว้เป็นหลักฐานในราชการ"
  },
  {
    q: "หนังสือสั่งการแบ่งออกเป็นกี่ประเภท",

    ans: 1,
    explain: "หนังสือสั่งการแบ่งเป็น <strong>3 ประเภท</strong> คือ (1) คำสั่ง (2) ระเบียบ (3) ข้อบังคับ"
  },
  {
    q: "หนังสือประชาสัมพันธ์มีกี่ชนิด และมีชนิดใดบ้าง",
    opts: ["2 ชนิด: ประกาศ และแถลงการณ์","3 ชนิด: ประกาศ แถลงการณ์ และข่าว","3 ชนิด: ประกาศ แถลงการณ์ และบันทึก","4 ชนิด: ประกาศ แถลงการณ์ ข่าว และหนังสือเวียน"],
    ans: 1,
    explain: "หนังสือประชาสัมพันธ์มี <strong>3 ชนิด</strong> ได้แก่ (1) ประกาศ (2) แถลงการณ์ (3) ข่าว"
  },
  {
    q: "\"หนังสือที่เจ้าหน้าที่ทำขึ้นหรือรับไว้เป็นหลักฐานในราชการ\" มีกี่ชนิด",

  },
  {
    q: "ชั้นความเร็วของหนังสือราชการแบ่งเป็นกี่ประเภท",
    opts: ["2 ประเภท","3 ประเภท","4 ประเภท","5 ประเภท"],
    ans: 1,
    explain: "ชั้นความเร็วแบ่งเป็น <strong>3 ประเภท</strong> คือ (1) ด่วนที่สุด — ให้เจ้าหน้าที่ปฏิบัติในทันทีที่ได้รับ (2) ด่วนมาก — ให้ปฏิบัติโดยเร็วเท่าที่จะทำได้ (3) ด่วน — ให้ปฏิบัติเร็วกว่าปกติ"
  },
  {
    q: "ตัวอักษรที่ใช้ระบุชั้นความเร็วของหนังสือราชการต้องพิมพ์ด้วยสีใด",
    opts: ["สีดำ","สีน้ำเงิน","สีแดง","สีเขียว"],

  },
  {
    q: "หนังสือประทับตราใช้ในกรณีใดต่อไปนี้",

    explain: "หนังสือประทับตราใช้แทนการลงชื่อของหัวหน้าส่วนราชการระดับกรมขึ้นไป โดย<strong>หัวหน้าส่วนราชการระดับกองหรือผู้ที่ได้รับมอบหมายจากหัวหน้าส่วนราชการระดับกรมขึ้นไป เป็นผู้ลงชื่อย่อกำกับตรา</strong>"

  {

    opts: ["ทุกฉบับที่เคยติดต่อกันมาทั้งหมด","ฉบับสุดท้ายที่ติดต่อกันเพียงฉบับเดียว","ฉบับแรกที่ติดต่อกันเพียงฉบับเดียว","ฉบับที่มีความสำคัญที่สุดเพียงฉบับเดียว"],

    explain: "การอ้างถึง ให้อ้างถึง<strong>หนังสือฉบับสุดท้ายที่ติดต่อกันเพียงฉบับเดียว</strong> เว้นแต่มีเรื่องอื่นที่เป็นสาระสำคัญต้องนำมาพิจารณา จึงอ้างถึงหนังสือฉบับอื่น ๆ ที่เกี่ยวกับเรื่องนั้นโดยเฉพาะให้ทราบด้วย"

let answered = 0, correct = 0, wrong = 0;

function buildExam() {
  const body = document.getElementById('exam-body');
  body.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q' + i;

    const letters = ['ก','ข','ค','ง'];
    const optsHtml = q.opts.map((o, j) =>
      `<button class="option-btn" onclick="answer(${i},${j})" id="q${i}opt${j}">
        <span class="option-letter">${letters[j]}</span>
        <span>${o}</span>
      </button>`
    ).join('');

    card.innerHTML = `
      <div class="question-header">
        <span class="question-number">${i+1}</span>
        <span class="question-text">${q.q}</span>
      </div>
      <div class="options-list">${optsHtml}</div>
      <div class="explanation" id="exp${i}">
        <span class="answer-label">✓ เฉลยและคำอธิบาย</span>
        ${q.explain}
      </div>
    `;
    body.appendChild(card);
  });

  const result = document.createElement('div');
  result.className = 'result-bar';
  result.id = 'result-bar';
  result.innerHTML = `
    <h2>🎯 ผลการทำข้อสอบ</h2>
    <div class="result-score" id="result-score">0/50</div>
    <div id="result-grade" class="result-grade"></div>
    <p id="result-msg" style="margin-top:12px;color:#555;font-size:0.95rem;"></p>
    <button class="reset-btn" onclick="resetExam()">🔄 ทำใหม่</button>
  `;
  body.appendChild(result);
}

function answer(qi, chosen) {
  const q = questions[qi];
  const card = document.getElementById('q' + qi);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;

  const letters = ['ก','ข','ค','ง'];
  // disable all
  q.opts.forEach((_, j) => {
    const btn = document.getElementById(`q${qi}opt${j}`);
    btn.disabled = true;
  });

  const chosenBtn = document.getElementById(`q${qi}opt${chosen}`);
  const correctBtn = document.getElementById(`q${qi}opt${q.ans}`);

  if (chosen === q.ans) {
    chosenBtn.classList.add('correct-answer');
    card.classList.add('answered-correct');
    correct++;
  } else {
    chosenBtn.classList.add('wrong-answer');
    correctBtn.classList.add('correct-answer');
    card.classList.add('answered-wrong');
    wrong++;
  }

  document.getElementById('exp' + qi).classList.add('show');
  answered++;
  updateScore();

  if (answered === questions.length) showResult();
}

function updateScore() {
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('wrong-count').textContent = wrong;
  const pct = Math.round((correct / answered) * 100);
  document.getElementById('score-pct').textContent = answered > 0 ? pct + '%' : '-';
  document.getElementById('progress-fill').style.width = (answered / questions.length * 100) + '%';
  document.getElementById('progress-label').textContent = answered + ' / ' + questions.length;
}

function showResult() {
  const bar = document.getElementById('result-bar');
  bar.classList.add('show');
  bar.scrollIntoView({ behavior: 'smooth' });
  const pct = Math.round(correct / questions.length * 100);
  document.getElementById('result-score').textContent = correct + '/50 (' + pct + '%)';
  const grade = document.getElementById('result-grade');
  const msg = document.getElementById('result-msg');
  if (pct >= 90) {
    grade.textContent = '🏆 ยอดเยี่ยม';
    grade.style.cssText = 'background:#eafaf1;color:#1a6b3c;border:2px solid #1a6b3c';
    msg.textContent = 'คุณเชี่ยวชาญระเบียบสารบรรณในระดับสูงมาก';
  } else if (pct >= 75) {
    grade.textContent = '👍 ดีมาก';
    grade.style.cssText = 'background:#eef6ff;color:#1a3a7a;border:2px solid #1a3a7a';
    msg.textContent = 'คุณมีความรู้ระเบียบสารบรรณในระดับดี';
  } else if (pct >= 60) {
    grade.textContent = '✅ ผ่าน';
    grade.style.cssText = 'background:#fffbe6;color:#7d5a00;border:2px solid #c9a227';
    msg.textContent = 'ควรทบทวนเนื้อหาส่วนที่ตอบผิดเพิ่มเติม';
  } else {
    grade.textContent = '📚 ต้องทบทวน';
    grade.style.cssText = 'background:#fef0ee;color:#c0392b;border:2px solid #c0392b';
    msg.textContent = 'แนะนำให้ศึกษาระเบียบสารบรรณเพิ่มเติมก่อนสอบ';
  }
}

function resetExam() {
  answered = 0; correct = 0; wrong = 0;
  updateScore();
  document.getElementById('score-pct').textContent = '-';
  buildExam();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildExam();
</script>
